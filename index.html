function CoverageStrip({ routine, exById }) {
  const cov = useMemo(() => routineCoverage(routine, exById), [routine, exById]);
  const hit = GROUPS.filter((g) => cov.primary[g.id] || cov.secondary[g.id]);
  const missed = GROUPS.filter((g) => !cov.primary[g.id] && !cov.secondary[g.id]);

  if (cov.strength === 0) {
    return (
      <div style={{ marginTop: 12 }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)" }}>
          {cov.cardio ? "Cardio session · no muscle targets" : "Add exercises to see coverage"}
        </div>
      </div>
    );
  }

  return (
    <div style={{ marginTop: 14 }}>
      <div className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)", marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
        <span>Muscle coverage</span>
        <span style={{ color: missed.length ? "var(--accent)" : "var(--good)" }}>{hit.length}/{GROUPS.length} groups</span>
      </div>
      <div className="tags">
        {GROUPS.map((g) => {
          const p = cov.primary[g.id] || 0, s = cov.secondary[g.id] || 0;
          const isMissed = !p && !s;
          const secOnly = !p && s > 0;
          return (
            <span className="tag" key={g.id} style={{
              background: p ? `${g.color}1e` : "var(--surface2)",
              borderColor: p ? `${g.color}66` : "var(--line)",
              borderStyle: isMissed ? "dashed" : "solid",
              opacity: isMissed ? .55 : 1,
              color: isMissed ? "var(--steel)" : "var(--ink)",
            }}>
              <span className="dot" style={{ background: isMissed ? "var(--steel)" : g.color, opacity: secOnly ? .5 : 1 }} />
              {g.name}
              {p ? <b className="mono" style={{ marginLeft: 3, color: g.color }}>{p}</b>
                : secOnly ? <span className="mono" style={{ marginLeft: 3, opacity: .7 }}>2°</span> : null}
            </span>
          );
        })}
      </div>
      {missed.length > 0 && (
        <div className="muted" style={{ fontSize: 11, marginTop: 8 }}>
          Missing: {missed.map((g) => g.name).join(", ")}
        </div>
      )}
    </div>
  );
}

function ReorderList({ items, onReorder, onRemove }) {
  const [dragId, setDragId] = useState(null);
  const ref = useRef(null);
  const itemsRef = useRef(items); itemsRef.current = items;
  useEffect(() => {
    if (dragId == null) return;
    const onMove = (ev) => {
      const y = ev.clientY;
      const rows = ref.current ? Array.from(ref.current.querySelectorAll("[data-rid]")) : [];
      let overId = null;
      for (const r of rows) { const b = r.getBoundingClientRect(); if (y >= b.top && y <= b.bottom) { overId = r.getAttribute("data-rid"); break; } }
      if (overId && overId !== dragId) {
        const order = itemsRef.current.map((i) => i.id);
        const from = order.indexOf(dragId), to = order.indexOf(overId);
        if (from > -1 && to > -1) { order.splice(to, 0, order.splice(from, 1)[0]); onReorder(order); }
      }
      ev.preventDefault();
    };
    const onUp = () => setDragId(null);
    window.addEventListener("pointermove", onMove, { passive: false });
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
    return () => { window.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); window.removeEventListener("pointercancel", onUp); };
  }, [dragId]);
  return (
    <div ref={ref} className="reorder">
      {items.map((it, i) => (
        <div key={it.id} data-rid={it.id} className={`reorder-row ${dragId === it.id ? "dragging" : ""}`}>
          <button className="draghandle" style={{ touchAction: "none" }} onPointerDown={() => setDragId(it.id)} aria-label="Drag to reorder"><GripVertical size={16} /></button>
          <span className="ord mono">{i + 1}</span>
          <div className="grow" style={{ minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 14 }}>{it.name}</div>
            {it.sub && <div className="mono" style={{ fontSize: 11, color: "var(--steel)", marginTop: 2 }}>{it.sub}</div>}
          </div>
          {onRemove && <button className="iconbtn" onClick={() => onRemove(it.id)}><X size={15} /></button>}
        </div>
      ))}
    </div>
  );
}

function Workout({ active, saveActive, exById, exercises, sessions, unit, dist, startRest, restDefault, setRestDefault, finishWorkout, setTab }) {
  const [elapsed, setElapsed] = useState(0);
  const [confirm, setConfirm] = useState(false);
  const [adding, setAdding] = useState(false);
  const [wType, setWType] = useState(null);
  const [collapse, setCollapse] = useState({}); // exerciseId -> bool override
  const [hrPhoto, setHrPhoto] = useState(null);
  const [hrBusy, setHrBusy] = useState(false);
  const hrRef = useRef(null);

  useEffect(() => {
    if (!active) return;
    const t = setInterval(() => setElapsed(Math.round((Date.now() - active.startedAt) / 1000)), 1000);
    setElapsed(Math.round((Date.now() - active.startedAt) / 1000));
    return () => clearInterval(t);
  }, [active?.id]);

  if (!active) {
    return (
      <>
        <div className="top"><div><div className="eyebrow">Live session</div><h1>Workout</h1></div></div>
        <div className="card">
          <div className="empty">
            <Dumbbell size={30} style={{ color: "var(--steel)", marginBottom: 10 }} />
            <div className="big">No active workout</div>
            <p>Head to Routines, pick your split for today, and hit Start.</p>
            <button className="btn acc" onClick={() => setTab("routines")}><ChevronRight size={16} /> Go to routines</button>
          </div>
        </div>
      </>
    );
  }

  const isComplete = (ex, s) => ex && TRACKING[ex.trackingType].fields.every((f) => String(s[f] ?? "").trim() !== "");
  const update = (entryIdx, setId, field, value) => {
    const en = active.entries[entryIdx];
    const ex = exById[en.exerciseId];
    const oldSet = en.sets.find((s) => s.id === setId);
    const ns = { ...oldSet, [field]: value };
    const fire = isComplete(ex, ns) && !isComplete(ex, oldSet);
    const entries = active.entries.map((e, i) => i !== entryIdx ? e : { ...e, sets: e.sets.map((s) => s.id === setId ? ns : s) });
    saveActive({ ...active, entries });
    if (fire) startRest(restDefault);
  };
  const toggleDone = (entryIdx, setId) => {
    const en = active.entries[entryIdx];
    const ex = exById[en.exerciseId];
    let wasDone = false, s0 = null;
    const entries = active.entries.map((e, i) => i !== entryIdx ? e : {
      ...e, sets: e.sets.map((s) => { if (s.id === setId) { wasDone = s.done; s0 = s; return { ...s, done: !s.done }; } return s; }),
    });
    saveActive({ ...active, entries });
    setCollapse((c) => { const n = { ...c }; delete n[en.exerciseId]; return n; });
    if (!wasDone && !isComplete(ex, s0)) startRest(restDefault);
  };
  const addSet = (entryIdx) => {
    const ex = exById[active.entries[entryIdx].exerciseId]; const d = liftDefaults(ex);
    const tgt = ex && ex.category !== "cardio" ? `${d.lo}-${d.hi}` : "";
    const entries = active.entries.map((en, i) => i !== entryIdx ? en : { ...en, sets: [...en.sets, newSet({ target: tgt })] });
    saveActive({ ...active, entries });
  };
  const addWarmup = (entryIdx) => {
    const entries = active.entries.map((en, i) => {
      if (i !== entryIdx || en.sets.filter((s) => s.warmup).length >= 3) return en;
      const fw = en.sets.findIndex((s) => !s.warmup);
      const sets = [...en.sets]; sets.splice(fw < 0 ? sets.length : fw, 0, newSet({ warmup: true }));
      return { ...en, sets };
    });
    saveActive({ ...active, entries });
  };
  const removeSet = (entryIdx, setId) => {
    const entries = active.entries.map((en, i) => i !== entryIdx ? en : { ...en, sets: en.sets.filter((s) => s.id !== setId) });
    saveActive({ ...active, entries });
  };
  const removeExercise = (entryIdx) => saveActive({ ...active, entries: active.entries.filter((_, i) => i !== entryIdx) });
  const addExercise = (id) => { const ex = exById[id]; saveActive({ ...active, entries: [...active.entries, { exerciseId: id, sets: makeSets(ex, lastFor(id), unit) }] }); setAdding(false); };

  const lastFor = (exId) => {
    for (const s of sessions) { const e = s.entries.find((x) => x.exerciseId === exId); if (e) return e; }
    return null;
  };

  const totalSets = active.entries.reduce((n, en) => n + en.sets.filter((s) => s.done).length, 0);
  const totalVol = active.entries.reduce((v, en) => v + en.sets.reduce((a, s) => a + (num(s.weight) * num(s.reps)), 0), 0);

  return (
    <>
      <div className="top">
        <div>
          <div className="eyebrow mono">Started {new Date(active.startedAt).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })} · {fmtTime(elapsed)} elapsed{active.plannedMin ? ` / ${active.plannedMin}m planned` : ""}</div>
          <h1>{active.routineName}</h1>
        </div>
        <button className="btn acc sm" onClick={() => setConfirm(true)}><Check size={15} /> Finish</button>
      </div>

      <div className="card tight" style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)", display: "inline-flex", alignItems: "center", gap: 6 }}><TimerIcon size={13} /> Rest between sets</span>
        <div className="seg" style={{ marginLeft: "auto" }}>
          {[45, 60, 90, 120, 180].map((s) => (
            <button key={s} className={`mono ${restDefault === s ? "on" : ""}`} onClick={() => setRestDefault(s)}>{s}</button>
          ))}
        </div>
      </div>
      <p className="muted" style={{ fontSize: 11, margin: "-4px 2px 12px" }}>Timer auto-starts when you log a set's {TRACKING[exById[active.entries[0]?.exerciseId]?.trackingType]?.fields.join(" & ") || "reps"}.</p>

      {active.entries.map((en, ei) => {
        const ex = exById[en.exerciseId]; if (!ex) return null;
        const fields = TRACKING[ex.trackingType].fields;
        const last = lastFor(en.exerciseId);
        const cols = `28px ${fields.map(() => "1fr").join(" ")} 40px 30px`;
        const lastTxt = last ? last.sets.map((s) => {
          if (s.weight) return `${s.weight}×${s.reps}`;
          if (s.timeSec) return fmtTime(s.timeSec);
          if (s.distance) return `${s.distance}${dist}`;
          return `${s.reps}`;
        }).join("  ") : null;
        return (() => {
          const allDone = en.sets.length > 0 && en.sets.every((s) => s.done);
          const isCollapsed = collapse[en.exerciseId] !== undefined ? collapse[en.exerciseId] : allDone;
          const doneCount = en.sets.filter((s) => s.done).length;
          const setsTxt = en.sets.map((s) => {
            if (num(s.weight) > 0 && num(s.reps) > 0) return `${s.weight}×${s.reps}`;
            if (s.time) return s.time;
            if (s.distance) return `${s.distance}${dist}`;
            if (num(s.reps) > 0) return `${s.reps}`;
            return null;
          }).filter(Boolean).join("  ");
          if (isCollapsed) return (
            <button className={`exblock excollapsed ${allDone ? "alldone" : ""}`} key={ei}
              onClick={() => setCollapse((c) => ({ ...c, [en.exerciseId]: false }))}>
              <span className={`donedot ${allDone ? "on" : ""}`}><Check size={13} /></span>
              <span style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
                <span className="en" style={{ fontSize: 15.5, display: "block" }}>{ex.name}</span>
                <span className="mono colmeta">{doneCount}/{en.sets.length} sets{setsTxt ? ` · ${setsTxt}` : ""}</span>
              </span>
              <ChevronRight size={17} style={{ color: "var(--steel)", transform: "rotate(90deg)", flex: "none" }} />
            </button>
          );
          return (
          <div className="exblock" key={ei}>
            <div className="exhead">
              <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="en">{ex.name}</div>
                  <div style={{ marginTop: 7 }}><MuscleTags ids={ex.primary} /></div>
                  {lastTxt && <div className="last">Last: {lastTxt}</div>}
                </div>
                {allDone && (
                  <button className="iconbtn" title="Collapse" onClick={() => setCollapse((c) => ({ ...c, [en.exerciseId]: true }))}>
                    <ChevronRight size={16} style={{ transform: "rotate(-90deg)" }} />
                  </button>
                )}
                <button className="iconbtn" onClick={() => removeExercise(ei)}><Trash2 size={15} /></button>
              </div>
            </div>
            <div className="setgrid">
              <div className="setlabels" style={{ gridTemplateColumns: cols }}>
                <span></span>
                {fields.map((f) => <span key={f} style={{ textAlign: "center" }}>{f === "weight" ? unit : f === "distance" ? dist : f === "time" ? "m:ss" : f}</span>)}
                <span></span>
                <span></span>
              </div>
              {(() => {
                const d = liftDefaults(ex);
                let wc = 0, sc = 0;
                const labelled = en.sets.map((s) => ({ s, label: s.warmup ? `W${++wc}` : `${++sc}` }));
                const work = en.sets.filter((s) => !s.warmup);
                const progressed = ex.category !== "cardio" && work.length > 0 && work.every((s) => s.done && num(s.reps) >= d.hi);
                return (
                  <>
                    {labelled.map(({ s, label }) => (
                      <div className={`setrow ${s.done ? "done" : ""} ${s.warmup ? "warm" : ""}`} key={s.id} style={{ gridTemplateColumns: cols }}>
                        <span className="setno">{label}</span>
                        {fields.map((f) => (
                          <input key={f} className="inp" inputMode={f === "time" ? "text" : "decimal"}
                            value={s[f]} placeholder={f === "weight" && s.phw ? s.phw : f === "reps" ? (s.phr || (!s.warmup && s.target) || "0") : f === "time" ? "0:00" : "0"}
                            onChange={(e) => update(ei, s.id, f, e.target.value)}
                            onDoubleClick={() => removeSet(ei, s.id)} />
                        ))}
                        <button className={`ck ${s.done ? "on" : ""}`} onClick={() => toggleDone(ei, s.id)}><Check size={18} /></button>
                        <button className="setdel" aria-label="Delete set" onClick={() => removeSet(ei, s.id)}><X size={15} /></button>
                      </div>
                    ))}
                    {ex.category !== "cardio" ? (
                      <div style={{ display: "flex", gap: 8 }}>
                        <button className="addset" style={{ flex: 1 }} disabled={en.sets.filter((x) => x.warmup).length >= 3} onClick={() => addWarmup(ei)}><Plus size={15} /> Warm-up</button>
                        <button className="addset" style={{ flex: 1 }} onClick={() => addSet(ei)}><Plus size={15} /> Working set</button>
                      </div>
                    ) : <button className="addset" onClick={() => addSet(ei)}><Plus size={15} /> Add set</button>}
                    {progressed && <div className="progresshint"><TrendingUp size={13} /> Hit {d.hi} on every working set — add {incFor(ex, unit)}{unit} next time</div>}
                  </>
                );
              })()}
            </div>
          </div>
          );
        })();
      })}

      <button className="btn ghost" onClick={() => setAdding(true)}><Plus size={16} /> Add exercise</button>
      <div style={{ height: 12 }} />
      <button className="btn acc" onClick={() => setConfirm(true)}><Check size={17} /> Finish workout</button>
      <button className="btn ghost" style={{ marginTop: 10 }} onClick={() => { if (window.confirm("Discard this workout? Nothing will be saved.")) { saveActive(null); setTab("home"); } }}>Discard</button>

      {adding && (
        <PickExercise exercises={exercises} exclude={active.entries.map((e) => e.exerciseId)} onPick={addExercise} onClose={() => setAdding(false)} />
      )}
      {confirm && (() => {
        const derived = active.entries.length && active.entries.every((en) => exById[en.exerciseId]?.category === "cardio") ? "cardio" : "weights";
        const chosen = wType || derived;
        return (
          <div className="scrim" onClick={() => setConfirm(false)}>
            <div className="sheet" onClick={(e) => e.stopPropagation()} style={{ paddingBottom: 24 }}>
              <div className="sheeth"><div className="tt">Finish workout?</div><button className="iconbtn" onClick={() => setConfirm(false)}><X size={18} /></button></div>
              <p className="muted" style={{ marginBottom: 14 }}>{fmtDur(elapsed)} · {totalSets} completed sets · {Math.round(totalVol).toLocaleString()} {unit} volume. Empty sets are skipped.</p>
              <div className="field">
                <label>Workout type · shown on your calendar</label>
                <div className="tags">
                  {WORKOUT_TYPES.map((t) => {
                    const on = chosen === t.id;
                    return (
                      <button key={t.id} className={`tag chip ${on ? "on" : ""}`}
                        style={on ? { background: t.color } : {}} onClick={() => setWType(t.id)}>
                        <span className="dot" style={{ background: on ? "#fff" : t.color }} />{t.name}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="field">
                <label>Heart-rate photo · optional</label>
                <input ref={hrRef} type="file" accept="image/*" style={{ display: "none" }}
                  onChange={async (e) => {
                    const f = e.target.files?.[0]; e.target.value = "";
                    if (!f) return;
                    setHrBusy(true);
                    try { setHrPhoto(await compressImage(f)); } catch { setHrPhoto(null); }
                    setHrBusy(false);
                  }} />
                {hrPhoto ? (
                  <div style={{ position: "relative", borderRadius: 12, overflow: "hidden", border: "1px solid var(--line)" }}>
                    <img src={hrPhoto} alt="Heart rate" style={{ width: "100%", display: "block", maxHeight: 220, objectFit: "cover" }} />
                    <button onClick={() => setHrPhoto(null)} style={{ position: "absolute", top: 8, right: 8, background: "rgba(20,20,22,.7)", color: "#fff", borderRadius: 999, width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center" }}><X size={16} /></button>
                  </div>
                ) : (
                  <button className="btn ghost" disabled={hrBusy} onClick={() => hrRef.current?.click()}>
                    <Plus size={16} /> {hrBusy ? "Adding…" : "Add Whoop screenshot"}
                  </button>
                )}
              </div>
              <button className="btn acc" onClick={() => finishWorkout(chosen, hrPhoto)}><Check size={17} /> Save workout</button>
              <button className="btn ghost" style={{ marginTop: 10 }} onClick={() => setConfirm(false)}>Keep going</button>
            </div>
          </div>
        );
      })()}
    </>
  );
}

function PickExercise({ exercises, exclude, onPick, onClose }) {
  const [q, setQ] = useState("");
  const list = exercises.filter((e) => !exclude.includes(e.id) && e.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth"><div className="tt">Add exercise</div><button className="iconbtn" onClick={onClose}><X size={18} /></button></div>
        <div style={{ position: "relative", marginBottom: 12 }}>
          <Search size={15} style={{ position: "absolute", left: 12, top: 13, color: "var(--steel)" }} />
          <input className="tin" style={{ paddingLeft: 34 }} value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search library" />
        </div>
        {list.map((e) => (
          <button key={e.id} onClick={() => onPick(e.id)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", textAlign: "left", padding: 12, marginBottom: 6, borderRadius: 11, background: "var(--surface)", border: "1px solid var(--line)" }}>
            <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{e.name}</div>
              <div className="mono" style={{ fontSize: 11, color: "var(--steel)", marginTop: 2 }}>{TRACKING[e.trackingType].label}</div></div>
            <Plus size={18} />
          </button>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   LIBRARY
   ============================================================ */
function LibraryView({ exercises, saveEx, routines }) {
  const [editing, setEditing] = useState(null);
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("all");

  const usedIn = (id) => routines.filter((r) => r.exerciseIds.includes(id)).length;
  const del = (id) => { if (window.confirm("Delete this exercise? It stays in past workout history.")) saveEx(exercises.filter((e) => e.id !== id)); };
  const save = (ex) => {
    if (ex.id && exercises.some((e) => e.id === ex.id)) saveEx(exercises.map((e) => e.id === ex.id ? ex : e));
    else saveEx([...exercises, { ...ex, id: uid() }]);
    setEditing(null);
  };

  const matches = (e) => e.name.toLowerCase().includes(q.toLowerCase());
  const chips = [{ id: "all", name: "All" }, ...GROUPS, { id: "cardio", name: "Cardio", color: "#DE3417" }];
  const sectionDefs = [...GROUPS, { id: "cardio", name: "Cardio", color: "#DE3417" }, { id: "other", name: "Other", color: "#8B8E95" }];
  const counts = Object.fromEntries(sectionDefs.map((s) => [s.id, 0]));
  exercises.forEach((e) => { counts[groupForExercise(e)] = (counts[groupForExercise(e)] || 0) + 1; });

  const sections = sectionDefs
    .filter((sec) => filter === "all" || filter === sec.id)
    .map((sec) => ({ ...sec, items: exercises.filter((e) => matches(e) && groupForExercise(e) === sec.id) }))
    .filter((sec) => sec.items.length);

  const Row = (e) => (
    <div className="lrow" key={e.id}>
      <div className="grow">
        <div className="name">{e.name}</div>
        <div style={{ marginTop: 7, marginBottom: 2 }}><MuscleTags ids={e.primary} /></div>
        {e.subMuscles?.length ? (
          <div className="mono" style={{ fontSize: 10.5, color: "var(--steel)", marginTop: 5 }}>
            {e.subMuscles.map(subMuscleName).join(" · ")}
          </div>
        ) : null}
        <div className="sub">{TRACKING[e.trackingType].label}{e.category === "cardio" ? " · cardio" : ""}{usedIn(e.id) ? ` · in ${usedIn(e.id)} routine${usedIn(e.id) > 1 ? "s" : ""}` : ""}</div>
      </div>
      <button className="iconbtn" onClick={() => setEditing(e)}><Pencil size={15} /></button>
      <button className="iconbtn" onClick={() => del(e.id)}><Trash2 size={15} /></button>
    </div>
  );

  return (
    <>
      <div className="top">
        <div><div className="eyebrow">{exercises.length} movements</div><h1>Library</h1></div>
        <button className="iconbtn acc" onClick={() => setEditing({ name: "", category: "weight", trackingType: "weight_reps", primary: [], secondary: [], subMuscles: [] })}><Plus size={20} /></button>
      </div>

      <div style={{ position: "relative", marginBottom: 10 }}>
        <Search size={15} style={{ position: "absolute", left: 12, top: 13, color: "var(--steel)" }} />
        <input className="tin" style={{ paddingLeft: 34 }} value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search exercises" />
      </div>

      <div className="chiprow">
        {chips.map((c) => {
          const on = filter === c.id;
          const n = c.id === "all" ? exercises.length : counts[c.id] || 0;
          if (c.id !== "all" && n === 0) return null;
          return (
            <button key={c.id} className={`tag chip ${on ? "on" : ""}`}
              style={on ? { background: c.color || "var(--ink)", borderColor: "transparent" } : {}}
              onClick={() => setFilter(c.id)}>
              {c.color && <span className="dot" style={{ background: on ? "#fff" : c.color }} />}
              {c.name} <span style={{ opacity: .6, fontVariantNumeric: "tabular-nums" }}>{n}</span>
            </button>
          );
        })}
      </div>

      {sections.length ? sections.map((sec) => (
        <div key={sec.id}>
          <div className="divlabel" style={{ display: "flex", alignItems: "center", gap: 7 }}>
            <span style={{ width: 9, height: 9, borderRadius: 2, background: sec.color }} />
            {sec.name} · {sec.items.length}
          </div>
          <div className="card" style={{ padding: "4px 16px" }}>
            {sec.items.map(Row)}
          </div>
        </div>
      )) : (
        <div className="card"><div className="empty"><p>No exercises match. Add one with the + button.</p></div></div>
      )}

      {editing && <ExerciseEditor exercise={editing} onSave={save} onClose={() => setEditing(null)} />}
    </>
  );
}

function ExerciseEditor({ exercise, onSave, onClose }) {
  const [name, setName] = useState(exercise.name || "");
  const [category, setCategory] = useState(exercise.category || "weight");
  const [tracking, setTracking] = useState(exercise.trackingType || "weight_reps");
  const [primary, setPrimary] = useState(exercise.primary || []);
  const [secondary, setSecondary] = useState(exercise.secondary || []);
  const [subMuscles, setSubMuscles] = useState(exercise.subMuscles || []);

  const trackOptions = category === "cardio"
    ? ["distance_time", "time", "time_sets"]
    : ["weight_reps", "reps", "time", "time_sets", "distance_time"];

  const selectedMuscles = [...new Set([...primary, ...secondary])];
  const subMuscleMuscles = selectedMuscles.filter((m) => SUBMUSCLES[m]);
  const availableSubs = new Set(subMuscleMuscles.flatMap((m) => SUBMUSCLES[m].map((s) => s.id)));
  const toggleSub = (id) => setSubMuscles((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);

  const setCat = (c) => {
    setCategory(c);
    if (c === "cardio" && !["distance_time", "time", "time_sets"].includes(tracking)) setTracking("distance_time");
    if (c === "weight" && tracking === "distance_time") setTracking("weight_reps");
  };
  const togglePrimary = (id) => {
    setPrimary((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);
    setSecondary((s) => s.filter((x) => x !== id));
  };
  const toggleSecondary = (id) => {
    if (primary.includes(id)) return;
    setSecondary((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);
  };

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth">
          <div className="tt">{exercise.id ? "Edit exercise" : "New exercise"}</div>
          <button className="iconbtn" onClick={onClose}><X size={18} /></button>
        </div>

        <div className="field">
          <label>Name</label>
          <input className="tin" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Cable Lateral Raise" />
        </div>

        <div className="field">
          <label>Type</label>
          <div className="seg" style={{ width: "100%" }}>
            <button style={{ flex: 1 }} className={category === "weight" ? "on" : ""} onClick={() => setCat("weight")}>Weights</button>
            <button style={{ flex: 1 }} className={category === "cardio" ? "on" : ""} onClick={() => setCat("cardio")}>Cardio</button>
          </div>
        </div>

        <div className="field">
          <label>How it's tracked</label>
          <div className="tags">
            {trackOptions.map((t) => (
              <button key={t} className={`tag chip ${tracking === t ? "on" : ""}`}
                style={tracking === t ? { background: "var(--ink)" } : {}} onClick={() => setTracking(t)}>
                {TRACKING[t].label}
              </button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Primary muscles · {primary.length}</label>
          <div className="tags">
            {MUSCLES.map((m) => (
              <button key={m.id} className={`tag chip ${primary.includes(m.id) ? "on" : ""}`}
                style={primary.includes(m.id) ? { background: m.color } : {}} onClick={() => togglePrimary(m.id)}>
                <span className="dot" style={{ background: primary.includes(m.id) ? "#fff" : m.color }} />{m.name}
              </button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Secondary muscles · {secondary.length}</label>
          <div className="tags">
            {MUSCLES.map((m) => {
              const isP = primary.includes(m.id);
              const on = secondary.includes(m.id);
              return (
                <button key={m.id} className={`tag chip ${on ? "on" : ""}`}
                  style={{ ...(on ? { background: m.color } : {}), opacity: isP ? .3 : 1 }} onClick={() => toggleSecondary(m.id)}>
                  <span className="dot" style={{ background: on ? "#fff" : m.color }} />{m.name}
                </button>
              );
            })}
          </div>
        </div>

        {subMuscleMuscles.length > 0 && (
          <div className="field">
            <label>Sub-muscles · optional · {subMuscles.filter((id) => availableSubs.has(id)).length}</label>
            {subMuscleMuscles.map((m) => (
              <div key={m} style={{ marginBottom: 12 }}>
                <div className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)", marginBottom: 7, display: "flex", alignItems: "center", gap: 6 }}>
                  <span className="dot" style={{ background: muscleById[m].color, width: 8, height: 8, borderRadius: 2 }} />{muscleById[m].name}
                </div>
                <div className="tags">
                  {SUBMUSCLES[m].map((s) => {
                    const on = subMuscles.includes(s.id);
                    return (
                      <button key={s.id} className={`tag chip ${on ? "on" : ""}`}
                        style={on ? { background: muscleById[m].color } : {}} onClick={() => toggleSub(s.id)}>
                        {s.name}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        <button className="btn acc" disabled={!name.trim() || primary.length === 0} onClick={() =>
          onSave({ ...exercise, name: name.trim(), category, trackingType: tracking, primary, secondary, subMuscles: subMuscles.filter((id) => availableSubs.has(id)) })}>
          <Check size={17} /> Save exercise
        </button>
        {primary.length === 0 && <p className="muted" style={{ textAlign: "center", marginTop: 10 }}>Pick at least one primary muscle.</p>}
      </div>
    </div>
  );
}

   CALENDAR
   ============================================================ */
function CalendarView({ sessions, quickLog, deleteSession }) {
  const now = new Date();
  const [ym, setYm] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const [dayOpen, setDayOpen] = useState(null);

  const byDay = useMemo(() => {
    const map = {};
    sessions.forEach((s) => { (map[dayKey(s.date)] ||= []).push(s); });
    return map;
  }, [sessions]);

  const first = new Date(ym.y, ym.m, 1);
  const startWeekday = (first.getDay() + 6) % 7; // Mon = 0
  const daysInMonth = new Date(ym.y, ym.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthLabel = first.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const prev = () => setYm(({ y, m }) => (m === 0 ? { y: y - 1, m: 11 } : { y, m: m - 1 }));
  const next = () => setYm(({ y, m }) => (m === 11 ? { y: y + 1, m: 0 } : { y, m: m + 1 }));
  const isFuture = ym.y > now.getFullYear() || (ym.y === now.getFullYear() && ym.m >= now.getMonth());

  const monthSessions = sessions.filter((s) => { const d = new Date(s.date); return d.getFullYear() === ym.y && d.getMonth() === ym.m; });
  const typeCounts = {};
  monthSessions.forEach((s) => { const t = sessionType(s); typeCounts[t] = (typeCounts[t] || 0) + 1; });
  const trained = new Set(monthSessions.map((s) => dayKey(s.date))).size;
  const dayList = dayOpen ? (byDay[dayKey(dayOpen)] || []) : [];

  return (
    <>
      <div className="top">
        <div><div className="eyebrow">{trained} days trained</div><h1>Calendar</h1></div>
      </div>

      <div className="card">
        <div className="ch" style={{ marginBottom: 8 }}>
          <button className="iconbtn" onClick={prev}><ChevronLeft size={18} /></button>
          <div className="disp" style={{ fontWeight: 800, fontSize: 16, textTransform: "uppercase", letterSpacing: .5 }}>{monthLabel}</div>
          <button className="iconbtn" onClick={next} disabled={isFuture} style={isFuture ? { opacity: .35 } : {}}><ChevronRight size={18} /></button>
        </div>

        <div className="calhead">
          {["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"].map((d) => <span key={d}>{d}</span>)}
        </div>
        <div className="calgrid">
          {cells.map((d, i) => {
            if (d === null) return <div key={i} className="calcell empty" />;
            const key = dayKey(new Date(ym.y, ym.m, d).getTime());
            const daySess = byDay[key] || [];
            const types = [...new Set(daySess.map(sessionType))];
            const isToday = key === dayKey(Date.now());
            const ring = types[0] ? workoutTypeById[types[0]]?.color : null;
            return (
              <button key={i} className={`calcell ${isToday ? "today" : ""}`} onClick={() => setDayOpen(new Date(ym.y, ym.m, d, 12).getTime())}>
                <span className="dnum" style={{
                  boxShadow: ring ? `inset 0 0 0 2px ${ring}` : "none",
                  background: isToday ? "var(--ink)" : "transparent",
                  color: isToday ? "#fff" : "var(--ink)",
                }}>{d}</span>
                <span className="ddots">
                  {types.length > 1 && types.slice(0, 4).map((t) => (
                    <span key={t} className="ddot" style={{ background: workoutTypeById[t]?.color }} />
                  ))}
                </span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="t">This month</div>
          <span className="mono" style={{ fontSize: 11, color: "var(--steel)" }}>{monthSessions.length} workouts</span>
        </div>
        <div className="tags">
          {WORKOUT_TYPES.map((t) => (
            <span className="tag" key={t.id}><span className="dot" style={{ background: t.color, borderRadius: 999 }} />{t.name} {typeCounts[t.id] ? <b className="mono" style={{ marginLeft: 2 }}>{typeCounts[t.id]}</b> : <span className="muted" style={{ marginLeft: 2 }}>0</span>}</span>
          ))}
        </div>
      </div>

      {dayOpen && (
        <DaySheet date={dayOpen} sessions={dayList} onQuickLog={quickLog} onDelete={deleteSession} onClose={() => setDayOpen(null)} />
      )}
    </>
  );
}

function DaySheet({ date, sessions, onQuickLog, onDelete, onClose }) {
  const [type, setType] = useState("cardio");
  const [name, setName] = useState("");
  const [mins, setMins] = useState("");
  const label = new Date(date).toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });

  const add = () => { onQuickLog({ date, type, name, minutes: num(mins) }); setName(""); setMins(""); };

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth"><div className="tt">{label}</div>
          <button className="iconbtn" onClick={onClose}><X size={18} /></button>
        </div>

        {sessions.length > 0 && (
          <div className="card" style={{ padding: "4px 16px", marginBottom: 14 }}>
            {sessions.map((s) => {
              const t = workoutTypeById[sessionType(s)];
              const setCount = (s.entries || []).reduce((n, en) => n + en.sets.length, 0);
              const vol = (s.entries || []).reduce((v, en) => v + en.sets.reduce((a, st) => a + setVolume(st), 0), 0);
              const bits = [];
              if (setCount) bits.push(`${setCount} sets`);
              if (vol) bits.push(`${Math.round(vol).toLocaleString()} vol`);
              if (s.durationSec) bits.push(fmtDur(s.durationSec));
              return (
                <div className="lrow" key={s.id}>
                  <div className="grow">
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 9, height: 9, borderRadius: 999, background: t?.color, flex: "none" }} />
                      <span className="name" style={{ fontSize: 14.5 }}>{s.routineName}</span>
                    </div>
                    <div className="sub">{t?.name}{bits.length ? " · " + bits.join(" · ") : ""}</div>
                  </div>
                  <button className="iconbtn" onClick={() => { if (window.confirm("Delete this logged workout?")) onDelete(s.id); }}><Trash2 size={15} /></button>
                </div>
              );
            })}
          </div>
        )}

        <div className="divlabel" style={{ marginTop: 2 }}>Log a workout</div>
        <div className="card">
          <div className="field">
            <label>Type</label>
            <div className="tags">
              {WORKOUT_TYPES.map((t) => {
                const on = type === t.id;
                return (
                  <button key={t.id} className={`tag chip ${on ? "on" : ""}`}
                    style={on ? { background: t.color } : {}} onClick={() => setType(t.id)}>
                    <span className="dot" style={{ background: on ? "#fff" : t.color }} />{t.name}
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <div className="field" style={{ flex: 1, marginBottom: 0 }}>
              <label>Name · optional</label>
              <input className="tin" value={name} onChange={(e) => setName(e.target.value)} placeholder={workoutTypeById[type]?.name} />
            </div>
            <div className="field" style={{ width: 96, marginBottom: 0 }}>
              <label>Mins</label>
              <input className="tin mono" inputMode="numeric" value={mins} onChange={(e) => setMins(e.target.value)} placeholder="0" />
            </div>
          </div>
          <button className="btn acc" style={{ marginTop: 14 }} onClick={add}><Plus size={16} /> Add to this day</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   BODY MAP  — front/back muscle heat visualiser
   ============================================================ */
// Distribute an exercise's muscles (with sub-muscles + primary/secondary
// weighting) onto body-map regions, scaled by amount `w`.
function accrueRegions(acc, ex, w) {
  const subs = ex.subMuscles || [];
  const has = (id) => subs.includes(id);
  const add = (r, x) => { acc[r] = (acc[r] || 0) + x; };
  const doMuscle = (m, factor) => {
    const x = w * factor;
    switch (m) {
      case "chest": add("chest", x); break;
      case "shoulders":
        if (has("delt_front") || has("delt_side") || has("delt_rear") || has("traps")) {
          if (has("delt_front")) add("delt_front", x);
          if (has("delt_side")) add("delt_side", x);
          if (has("delt_rear")) add("delt_rear", x);
          if (has("traps")) add("traps", x);
        } else { add("delt_front", x * 0.6); add("delt_side", x); add("delt_rear", x * 0.4); }
        break;
      case "lats": add("lats", x); break;
      case "upper_back": add("traps", x); add("lats", x * 0.4); break;
      case "biceps": add("biceps", x); break;
      case "triceps": add("triceps", x); break;
      case "forearms": add("forearms", x); break;
      case "quads": add("quads", x); break;
      case "hamstrings": add("hamstrings", x); break;
      case "glutes": add("glutes", x); break;
      case "calves": add("calves", x); break;
      case "core": add("abs", x); if (has("obliques")) add("obliques", x); break;
      default: break;
    }
  };
  (ex.primary || []).forEach((m) => doMuscle(m, 1));
  (ex.secondary || []).forEach((m) => doMuscle(m, 0.5));
}
function normalizeRegions(acc) {
  const max = Math.max(1, ...Object.values(acc));
  const out = {};
  Object.keys(acc).forEach((k) => { out[k] = acc[k] / max; });
  return out;
}
// Planned coverage for a routine (each exercise counts once).
function routineIntensity(routine, exById) {
  const acc = {};
  (routine.exerciseIds || []).forEach((id) => {
    const ex = exById[id]; if (!ex || ex.category === "cardio") return;
    accrueRegions(acc, ex, 1);
  });
  return normalizeRegions(acc);
}
// Actual training over a window, combining weighting with logged sets/volume.
function loggedIntensity(sessions, days, metric) {
  const acc = {};
  sessions.filter((s) => within(s.date, days)).forEach((s) =>
    s.entries.forEach((en) => {
      if (en.category === "cardio") return;
      const amount = metric === "volume"
        ? en.sets.reduce((a, st) => a + setVolume(st), 0)
        : en.sets.length;
      if (amount > 0) accrueRegions(acc, en, amount);
    }));
  return normalizeRegions(acc);
}

const BODY_BASE = "#E4E2DA", BODY_STROKE = "#C7C5BC";
function shadeRegion(v) {
  if (!v) return BODY_BASE;
  v = Math.min(1, v);
  const a = [0xE4, 0xE2, 0xDA], b = [0xDE, 0x34, 0x17], t = 0.32 + 0.68 * v;
  const c = a.map((x, i) => Math.round(x + (b[i] - x) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

// Heat scale: 0 transparent -> cool -> blue -> green -> amber -> red
const HEAT_STOPS = [[0.0, [150, 178, 214]], [0.15, [150, 178, 214]], [0.35, [52, 107, 230]], [0.55, [47, 162, 90]], [0.75, [240, 168, 30]], [1.0, [222, 52, 23]]];
function getHeatColor(t) {
  t = Math.max(0, Math.min(1, t));
  if (t <= 0) return null;
  let a = HEAT_STOPS[0], b = HEAT_STOPS[HEAT_STOPS.length - 1];
  for (let i = 0; i < HEAT_STOPS.length - 1; i++) { if (t >= HEAT_STOPS[i][0] && t <= HEAT_STOPS[i + 1][0]) { a = HEAT_STOPS[i]; b = HEAT_STOPS[i + 1]; break; } }
  const f = (b[0] - a[0]) ? (t - a[0]) / (b[0] - a[0]) : 0;
  const c = a[1].map((v, i) => Math.round(v + (b[1][i] - v) * f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function accrueMap(acc, ex, w) {
  const subs = ex.subMuscles || [];
  const h = (id) => subs.includes(id);
  const add = (r, x) => { acc[r] = (acc[r] || 0) + x; };
  const doM = (m, f) => {
    const x = w * f;
    if (m === "chest") { let d = false; if (h("chest_upper")) { add("chest_upper", x); d = true; } if (h("chest_mid")) { add("chest_mid", x); d = true; } if (h("chest_lower")) { add("chest_lower", x); d = true; } if (!d) add("chest_mid", x); }
    else if (m === "shoulders") { let d = false; if (h("delt_front")) { add("delt_front", x); d = true; } if (h("delt_side")) { add("delt_side", x); d = true; } if (h("delt_rear")) { add("delt_rear", x); d = true; } if (h("traps")) { add("traps", x); d = true; } if (!d) { add("delt_front", x * 0.6); add("delt_side", x); add("delt_rear", x * 0.4); } }
    else if (m === "biceps") { let d = false; if (h("bi_long")) { add("biceps_long", x); d = true; } if (h("bi_short")) { add("biceps_short", x); d = true; } if (h("brachialis")) { add("biceps_long", x * 0.5); add("biceps_short", x * 0.5); d = true; } if (!d) { add("biceps_long", x); add("biceps_short", x); } }
    else if (m === "triceps") { let d = false; if (h("tri_long")) { add("triceps_long", x); d = true; } if (h("tri_lateral")) { add("triceps_lateral", x); d = true; } if (h("tri_medial")) { add("triceps_medial", x); d = true; } if (!d) { add("triceps_long", x); add("triceps_lateral", x); add("triceps_medial", x * 0.7); } }
    else if (m === "core") { let d = false; if (h("abs_upper")) { add("abs_upper", x); d = true; } if (h("abs_lower")) { add("abs_lower", x); d = true; } if (h("obliques")) { add("obliques", x); d = true; } if (h("transverse")) { add("abs_upper", x * 0.5); add("abs_lower", x * 0.5); d = true; } if (!d) { add("abs_upper", x); add("abs_lower", x); } }
    else if (m === "lats") { let d = false; if (h("lats_upper")) { add("back_upper", x); add("back_mid", x * 0.5); d = true; } if (h("lats_lower")) { add("back_lower", x); add("back_mid", x * 0.5); d = true; } if (!d) { add("back_mid", x); add("back_lower", x * 0.6); add("back_upper", x * 0.4); } }
    else if (m === "upper_back") { let d = false; if (h("rhomboids")) { add("back_upper", x); d = true; } if (h("mid_traps")) { add("back_upper", x * 0.6); add("traps", x * 0.5); d = true; } if (h("teres")) { add("back_upper", x); d = true; } if (h("traps")) { add("traps", x); d = true; } if (!d) add("back_upper", x); }
    else if (m === "quads") add("quads", x);
    else if (m === "hamstrings") add("hamstrings", x);
    else if (m === "glutes") add("glutes", x);
    else if (m === "calves") add("calves", x);
    else if (m === "forearms") add("forearms", x);
  };
  (ex.primary || []).forEach((m) => doM(m, 1));
  (ex.secondary || []).forEach((m) => doM(m, 0.5));
}

const BAL = { over: "var(--balance-over)", ok: "var(--balance-balanced)", under: "var(--balance-under)" };
function balanceColor(v, mean) {
  if (!v) return BODY_BASE;
  const r = v / (mean || 1);
  if (r >= 1.5) return BAL.over;
  if (r <= 0.55) return BAL.under;
  return BAL.ok;
}

function BodyView({ img, view, vb, overlays, colorForGroup, selected, onPick, debug }) {
  const [coord, setCoord] = useState(null);
  const [hoverId, setHoverId] = useState(null);
  const track = (e) => {
    const s = e.currentTarget, r = s.getBoundingClientRect(), v = s.viewBox.baseVal;
    setCoord([Math.round(v.x + (e.clientX - r.left) / r.width * v.width), Math.round(v.y + (e.clientY - r.top) / r.height * v.height)]);
  };
  return (
    <div style={{ flex: 1, textAlign: "center" }}>
      <div className="muscle-map-container" style={{ position: "relative", width: "100%", maxWidth: 186, margin: "0 auto" }}>
        <img className="muscle-map-base" src={img} alt={view + " view"} style={{ display: "block", width: "100%", height: "auto", borderRadius: 10 }} />
        <svg className="muscle-map-overlay" viewBox={vb} preserveAspectRatio="xMidYMid meet"
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}
          onPointerMove={debug ? track : undefined} onPointerLeave={debug ? () => { setCoord(null); setHoverId(null); } : undefined}>
          {overlays.map((o) => {
            const color = colorForGroup(o.group);
            const sel = selected === o.group;
            const cls = "muscle-path" + (sel ? " selected" : "") + (debug ? " debug" : "");
            const P = (side, transform) => {
              const id = o.base + (side ? "_" + side : "");
              const human = o.base.replace(/_/g, " ") + (side ? " (" + side + ")" : "");
              return (
                <path key={id} id={id} d={o.d} transform={transform} className={cls}
                  data-muscle={o.muscle} data-group={o.group} data-side={side || "center"}
                  tabIndex={0} role="button" aria-label={human}
                  fill={color || "#000"} fillOpacity={color ? 0.62 : 0}
                  onClick={() => onPick(o.group)}
                  onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onPick(o.group); } }}
                  onPointerEnter={debug ? () => setHoverId(id) : undefined} />
              );
            };
            return o.paired
              ? <g key={o.base}>{P("left")}{P("right", "translate(472,0) scale(-1,1)")}</g>
              : P("");
          })}
        </svg>
        {debug && (coord || hoverId) && (
          <div className="tracer-readout">{hoverId ? hoverId + " · " : ""}{coord ? coord[0] + "," + coord[1] : ""}</div>
        )}
      </div>
      <div className="viewlabel mono">{view}</div>
    </div>
  );
}

function BodyMap({ items }) {
  const [open, setOpen] = useState(null);
  const [mode, setMode] = useState("balance");
  const [debug, setDebug] = useState(false);
  const [selected, setSelected] = useState(null);
  const raw = useMemo(() => { const a = {}; items.forEach((it) => accrueMap(a, it, it.weight || 1)); return a; }, [items]);
  const heat = useMemo(() => normalizeRegions(raw), [raw]);
  const vals = Object.values(raw).filter((v) => v > 0);
  const mean = vals.length ? vals.reduce((x, y) => x + y, 0) / vals.length : 1;
  const fineColorFor = (r) => mode === "balance" ? balanceColor(raw[r] || 0, mean) : shadeRegion(heat[r] || 0);
  // whole-muscle group values
  const graw = {}; Object.entries(GROUP_REGIONS).forEach(([g, fs]) => { graw[g] = fs.reduce((a, f) => a + (raw[f] || 0), 0); });
  const gheat = normalizeRegions(graw);
  const gvals = Object.values(graw).filter((v) => v > 0);
  const gmean = gvals.length ? gvals.reduce((x, y) => x + y, 0) / gvals.length : 1;
  const colorForGroup = (g) => {
    if (mode === "balance") { const c = balanceColor(graw[g] || 0, gmean); return c === BODY_BASE ? null : c; }
    return getHeatColor(gheat[g] || 0);
  };
  const pick = (g) => { setSelected(g); setOpen(regionToMuscle[g]); };
  const close = () => { setOpen(null); setSelected(null); };
  return (
    <>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <div className="seg">
          <button className={mode === "balance" ? "on" : ""} onClick={() => setMode("balance")}>Balance</button>
          <button className={mode === "heat" ? "on" : ""} onClick={() => setMode("heat")}>Heat</button>
        </div>
        <button className={"iconbtn" + (debug ? " acc" : "")} title="Tracer / debug" onClick={() => setDebug((d) => !d)} style={{ width: 34, height: 34 }}><Search size={16} /></button>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
        <BodyView img={FRONT_IMG} view="Front" vb={FRONT_VB} overlays={OVERLAYS.front} colorForGroup={colorForGroup} selected={selected} onPick={pick} debug={debug} />
        <BodyView img={BACK_IMG} view="Back" vb={BACK_VB} overlays={OVERLAYS.back} colorForGroup={colorForGroup} selected={selected} onPick={pick} debug={debug} />
      </div>
      {mode === "balance" ? (
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 8, flexWrap: "wrap" }}>
          {[["Under", "var(--balance-under)"], ["Balanced", "var(--balance-balanced)"], ["Over", "var(--balance-over)"]].map(([t, c]) => (
            <span key={t} className="mono" style={{ fontSize: 10, color: "var(--ink2)", display: "inline-flex", alignItems: "center", gap: 5 }}>
              <span style={{ width: 9, height: 9, borderRadius: 999, background: c }} />{t}
            </span>
          ))}
        </div>
      ) : (
        <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center", marginTop: 8 }}>
          <span className="mono" style={{ fontSize: 10, color: "var(--ink2)" }}>Low</span>
          <span style={{ width: 120, height: 8, borderRadius: 999, background: "linear-gradient(90deg, rgb(150,178,214), rgb(52,107,230), rgb(47,162,90), rgb(240,168,30), rgb(222,52,23))" }} />
          <span className="mono" style={{ fontSize: 10, color: "var(--ink2)" }}>High</span>
        </div>
      )}
      <p className="muted" style={{ fontSize: 11, marginTop: 8, textAlign: "center" }}>{debug ? "Tracer on — hover for path id + SVG coordinates." : "Tap a muscle for its heads and exercises."}</p>
      {open && <MuscleZoom muscle={open} heat={heat} colorFor={fineColorFor} items={items} onClose={close} />}
    </>
  );
}

function MuscleZoom({ muscle, heat, colorFor, items, onClose }) {
  const info = MUSCLE_INFO[muscle];
  if (!info) return null;
  const maxHead = Math.max(1e-9, ...info.heads.map((h) => heat[h.id] || 0));
  const byName = {};
  items.forEach((it) => {
    const p = (it.primary || []).some((m) => info.muscleIds.includes(m));
    const s = (it.secondary || []).some((m) => info.muscleIds.includes(m));
    if (!p && !s) return;
    if (!byName[it.name] || (p && !byName[it.name].primary)) byName[it.name] = { name: it.name, primary: p };
  });
  const exs = Object.values(byName).sort((a, b) => (b.primary - a.primary) || a.name.localeCompare(b.name));
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth"><div className="tt">{info.name}</div><button className="iconbtn" onClick={onClose}><X size={18} /></button></div>
        <div className="card">
          <div className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)", marginBottom: 10 }}>Heads worked</div>
          {info.heads.map((hd) => { const v = heat[hd.id] || 0; return (
            <div className="mbar" key={hd.id} style={{ marginBottom: 9 }}>
              <div className="row"><span className="nm" style={{ fontSize: 13 }}>{hd.name}</span></div>
              <div className="track"><div className="fill" style={{ width: `${v > 0 ? Math.max(6, (v / maxHead) * 100) : 0}%`, background: v > 0 ? colorFor(hd.id) : "var(--surface2)" }} /></div>
            </div>
          ); })}
        </div>
        <div className="divlabel">Exercises hitting this muscle · {exs.length}</div>
        <div className="card" style={{ padding: "4px 16px" }}>
          {exs.length ? exs.map((e) => (
            <div className="lrow" key={e.name}>
              <div className="grow"><div className="name" style={{ fontSize: 14 }}>{e.name}</div></div>
              <span className="tag" style={{ background: e.primary ? "#FDE9E4" : "var(--surface2)", color: e.primary ? "var(--accent)" : "var(--ink2)", fontSize: 10 }}>{e.primary ? "Primary" : "Secondary"}</span>
            </div>
          )) : <div className="empty" style={{ padding: "16px 0" }}><p>Nothing here hits {info.name.toLowerCase()} yet.</p></div>}
        </div>
      </div>
    </div>
  );
}

        </div>
      )}

      <div className="card" style={{ padding: "4px 16px" }}>
        {list.length ? list.map((s) => {
          const t = workoutTypeById[sessionType(s)];
          const sets = s.entries.reduce((a, en) => a + en.sets.length, 0);
          const vol = Math.round(s.entries.reduce((a, en) => a + en.sets.reduce((x, st) => x + setVolume(st), 0), 0));
          const pn = progName(progOf(s));
          const bits = [new Date(s.date).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })];
          if (sets) bits.push(`${sets} sets`);
          if (vol) bits.push(`${vol.toLocaleString()} vol`);
          if (s.durationSec) bits.push(fmtDur(s.durationSec));
          return (
            <button key={s.id} className="lrow" onClick={() => setOpen(s)} style={{ width: "100%", textAlign: "left", background: "none" }}>
              <span style={{ width: 9, height: 9, borderRadius: 999, background: t?.color, flex: "none" }} />
              <div className="grow">
                <div className="name" style={{ fontSize: 14.5 }}>{s.routineName}</div>
                <div className="sub">{bits.join(" · ")}{pn ? ` · ${pn}` : ""}</div>
              </div>
              <ChevronRight size={16} style={{ color: "var(--steel)", flex: "none" }} />
            </button>
          );
        }) : <div className="empty" style={{ padding: "26px 0" }}><div className="big">No history yet</div><p>Finish a workout and it'll be recorded here with dates, sets and load.</p></div>}
      </div>

      {open && <SessionDetail session={open} progName={progName(progOf(open))} dist={dist} onClose={() => setOpen(null)} />}
    </>
  );
}

function SessionDetail({ session, progName, dist, onClose }) {
  const t = workoutTypeById[sessionType(session)];
  const [photo, setPhoto] = useState(null);
  const [zoom, setZoom] = useState(false);
  useEffect(() => {
    let live = true;
    if (session.hrPhoto) store.get(`hrphoto:${session.id}`, null).then((p) => { if (live) setPhoto(p); });
    return () => { live = false; };
  }, [session.id]);
  const sets = session.entries.reduce((a, en) => a + en.sets.length, 0);
  const vol = Math.round(session.entries.reduce((a, en) => a + en.sets.reduce((x, st) => x + setVolume(st), 0), 0));
  const fmtSet = (st) => {
    if (st.weight > 0 && st.reps > 0) return `${st.weight}×${st.reps}`;
    if (st.timeSec > 0) return fmtTime(st.timeSec);
    if (st.distance > 0) return `${st.distance}${dist}`;
    if (st.reps > 0) return `${st.reps}`;
    return "–";
  };
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth">
          <div className="tt" style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: t?.color }} />{session.routineName}</div>
          <button className="iconbtn" onClick={onClose}><X size={18} /></button>
        </div>
        <p className="muted" style={{ marginTop: 2, marginBottom: 12 }}>
          {new Date(session.date).toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" })}
          {progName ? ` · ${progName}` : ""} · {t?.name}
        </p>
        <div className="stats">
          <div className="stat"><div className="k">Sets</div><div className="v mono">{sets}</div></div>
          <div className="stat"><div className="k">Volume</div><div className="v mono">{vol.toLocaleString()}</div></div>
          {session.durationSec ? <div className="stat" style={{ gridColumn: "span 2" }}><div className="k">Duration{session.startedAt && session.endedAt ? ` · ${new Date(session.startedAt).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })}–${new Date(session.endedAt).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })}` : ""}</div><div className="v mono">{fmtDur(session.durationSec)}</div></div> : null}
        </div>
        {session.entries.length ? (
          <div className="card" style={{ padding: "4px 16px" }}>
            {session.entries.map((en, i) => (
              <div className="lrow" key={i}>
                <div className="grow">
                  <div className="name" style={{ fontSize: 14 }}>{en.name}</div>
                  <div className="sub">{en.sets.map(fmtSet).join("   ")}</div>
                </div>
              </div>
            ))}
          </div>
        ) : <div className="card"><p className="muted">Logged directly on the calendar — no set detail.</p></div>}
        {photo && (
          <>
            <div className="divlabel">Heart rate</div>
            <button onClick={() => setZoom(true)} style={{ display: "block", width: "100%", padding: 0, background: "none", borderRadius: 14, overflow: "hidden", border: "1px solid var(--line)" }}>
              <img src={photo} alt="Heart rate" style={{ width: "100%", display: "block" }} />
            </button>
          </>
        )}
      </div>
      {zoom && photo && (
        <div onClick={() => setZoom(false)} style={{ position: "fixed", inset: 0, zIndex: 90, background: "rgba(10,10,12,.92)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <img src={photo} alt="Heart rate" style={{ maxWidth: "100%", maxHeight: "100%", borderRadius: 10 }} />
        </div>
      )}
    </div>
  );
}

createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</body>
</html>
