<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef, useMemo } from "react";
import { createRoot } from "react-dom/client";
import {
  Home, Dumbbell, ClipboardList, Library as LibraryIcon,
  Play, Plus, Check, X, Trash2, ChevronLeft, Flame, TrendingUp,
  Timer as TimerIcon, Pause, RotateCcw, Pencil, Search, Activity,
  ChevronRight, CheckCircle2, Save, Database, Download, Upload, Copy, CalendarDays, Layers, History as HistoryIcon, GripVertical
} from "lucide-react";

/* ============================================================
   IRON & CHALK — a strength + cardio tracker
   Design: cool concrete surfaces, cast-iron ink, a single
   iron-oxide red action color, and competition-plate colors
   for muscle coding. Data readouts set in a mechanical mono.
   ============================================================ */

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700;800&display=swap');

:root{
  --concrete:#E6E5DF; --concrete2:#DCDBD4;
  --surface:#FFFFFF; --surface2:#F5F4F0;
  --ink:#16171A; --ink2:#54575E; --steel:#8B8E95;
  --line:#D8D6CE; --line2:#E7E5DE;
  --accent:#DE3417; --accent2:#B7280F;
  --good:#1E9E6A;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
.gt{ all:initial; }
.gt, .gt *{ font-family:'Inter',system-ui,sans-serif; }
.gt{
  display:block; background:var(--concrete); color:var(--ink);
  min-height:100vh; width:100%; overflow-x:hidden;
}
.gt .wrap{
  max-width:480px; width:100%; margin:0 auto; min-height:100vh; position:relative;
  background:var(--concrete); padding:0 16px 148px; overflow-x:hidden;
}
.gt .mono{ font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
.gt .disp{ font-family:'Archivo',sans-serif; }

/* top bar */
.gt .top{ padding:22px 2px 12px; display:flex; align-items:flex-end; justify-content:space-between; }
.gt .top .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--steel); }
.gt .top h1{ font-family:'Archivo',sans-serif; font-weight:900; font-size:30px; letter-spacing:-.02em; text-transform:uppercase; line-height:.95; margin:2px 0 0; }
.gt .unit{ display:flex; gap:6px; }

/* cards */
.gt .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; }
.gt .card.tight{ padding:14px; }
.gt .ch{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.gt .ch .t{ font-family:'Archivo',sans-serif; font-weight:800; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink); display:flex; align-items:center; gap:7px;}
.gt .ch .t svg{ color:var(--accent); }

/* stat grid */
.gt .stats{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.gt .stat{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:13px 14px; }
.gt .stat .k{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--steel); }
.gt .stat .v{ font-family:'JetBrains Mono',monospace; font-weight:800; font-size:26px; letter-spacing:-.02em; margin-top:5px; line-height:1; }
.gt .stat .v .u{ font-size:12px; color:var(--steel); font-weight:600; margin-left:3px; }

/* buttons */
.gt button{ cursor:pointer; border:none; background:none; font-family:inherit; }
.gt .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:'Archivo',sans-serif; font-weight:800; font-size:13px; letter-spacing:1px; text-transform:uppercase; border-radius:12px; padding:14px 16px; width:100%; transition:transform .05s ease, background .15s; }
.gt .btn:active{ transform:scale(.98); }
.gt .btn.acc{ background:var(--accent); color:#fff; }
.gt .btn.acc:active{ background:var(--accent2); }
.gt .btn.dark{ background:var(--ink); color:#fff; }
.gt .btn.ghost{ background:var(--surface2); color:var(--ink); border:1px solid var(--line); }
.gt .btn.sm{ width:auto; padding:9px 13px; font-size:11px; border-radius:10px; }
.gt .btn:disabled{ opacity:.4; }

.gt .iconbtn{ width:38px; height:38px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; background:var(--surface2); border:1px solid var(--line); color:var(--ink); flex:none; }
.gt .iconbtn.acc{ background:var(--accent); color:#fff; border-color:var(--accent); }

/* segmented */
.gt .seg{ display:inline-flex; background:var(--surface2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:2px; }
.gt .seg button{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; padding:6px 11px; border-radius:7px; color:var(--ink2); }
.gt .seg button.on{ background:var(--ink); color:#fff; }

/* tags */
.gt .tags{ display:flex; flex-wrap:wrap; gap:6px; }
.gt .tag{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; padding:4px 9px; border-radius:999px; background:var(--surface2); color:var(--ink2); border:1px solid var(--line); }
.gt .tag .dot{ width:8px; height:8px; border-radius:2px; }
.gt .tag.chip{ cursor:pointer; }
.gt .tag.chip.on{ color:#fff; border-color:transparent; }
.gt .chiprow{ display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:6px; scrollbar-width:none; }
.gt .chiprow::-webkit-scrollbar{ display:none; }
.gt .chiprow .tag{ flex:none; white-space:nowrap; }

/* muscle bars */
.gt .mbar{ margin-bottom:11px; }
.gt .mbar .row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.gt .mbar .nm{ font-size:12.5px; font-weight:600; }
.gt .mbar .val{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--ink2); }
.gt .mbar .track{ height:9px; background:var(--surface2); border-radius:6px; overflow:hidden; }
.gt .mbar .fill{ height:100%; border-radius:6px; transition:width .3s ease; }
.gt button.tapbar{ display:block; width:100%; text-align:left; background:none; padding:4px 2px 6px; border-radius:8px; }
.gt button.tapbar:active{ background:var(--surface2); }
.gt button.tapbar .nm{ display:inline-flex; align-items:center; gap:5px; }
.gt button.tapbar .go{ color:var(--steel); transform:translateY(1px); }
.gt .deltachip{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px; margin-left:auto; }
.gt .toast{ position:fixed; bottom:150px; left:50%; transform:translateX(-50%); z-index:80; background:var(--ink); color:#fff; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:.5px; padding:11px 18px; border-radius:999px; box-shadow:0 8px 24px rgba(0,0,0,.25); animation:toastin .25s ease; }
@keyframes toastin{ from{ opacity:0; transform:translate(-50%,8px);} to{ opacity:1; transform:translate(-50%,0);} }
.gt textarea.tin{ width:100%; display:block; }

/* calendar */
.gt .calhead{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px; width:100%; }
.gt .calhead span{ text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--steel); min-width:0; overflow:hidden; }
.gt .calgrid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; width:100%; }
.gt .calcell{ aspect-ratio:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:transparent; border-radius:10px; padding:2px; }
.gt .calcell:active{ background:var(--surface2); }
.gt .calcell.empty{ visibility:hidden; }
.gt .calcell .dnum{ width:28px; height:28px; max-width:100%; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; }
.gt .calcell.today .dnum{ font-weight:800; }
.gt .calcell .ddots{ display:flex; gap:3px; height:5px; align-items:center; }
.gt .calcell .ddot{ width:5px; height:5px; border-radius:50%; }

/* list rows */
.gt .lrow{ display:flex; align-items:center; gap:12px; padding:13px 0; border-top:1px solid var(--line2); }
.gt .lrow:first-child{ border-top:none; }
.gt .lrow .grow{ min-width:0; flex:1; }
.gt .lrow .name{ font-weight:700; font-size:14.5px; letter-spacing:-.01em; }
.gt .lrow .sub{ font-size:11.5px; color:var(--steel); margin-top:3px; font-family:'JetBrains Mono',monospace; }

/* routine cards */
.gt .rcard{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; position:relative; overflow:hidden; }
.gt .rcard .stripe{ position:absolute; left:0; top:0; bottom:0; width:5px; }
.gt .rcard .rname{ font-family:'Archivo',sans-serif; font-weight:900; font-size:22px; text-transform:uppercase; letter-spacing:-.01em; }
.gt .rcard .rmeta{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--steel); margin-top:2px; text-transform:uppercase; letter-spacing:1px; }
.gt .rcard .rex{ font-size:12.5px; color:var(--ink2); margin-top:10px; line-height:1.6; }

/* set tracking */
.gt .exblock{ background:var(--surface); border:1px solid var(--line); border-radius:14px; margin-bottom:14px; overflow:hidden; }
.gt .exhead{ padding:14px 14px 12px; border-bottom:1px solid var(--line2); }
.gt .exhead .en{ font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; letter-spacing:-.01em; }
.gt .exhead .last{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--steel); margin-top:4px; }
.gt .setgrid{ padding:6px 12px 12px; }
.gt .setlabels{ display:grid; gap:8px; align-items:center; padding:6px 2px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--steel); }
.gt .setrow{ display:grid; gap:8px; align-items:center; padding:5px 0; }
.gt .setrow .setno{ font-family:'JetBrains Mono',monospace; font-weight:800; font-size:14px; color:var(--ink2); text-align:center; }
.gt .setrow.done .setno{ color:var(--good); }
.gt .setrow.warm .setno{ color:#B8791E; font-size:12px; }
.gt .setrow.warm .inp{ background:#FBF4E4; border-color:#EFE1C4; }
.gt .setdel{ display:flex; align-items:center; justify-content:center; width:30px; height:36px; color:var(--steel); background:none; border:none; }
.gt .setdel:active{ color:var(--accent); }
.gt .excollapsed{ display:flex; align-items:center; gap:11px; width:100%; padding:13px 14px; background:var(--surface); border:1px solid var(--line); border-radius:16px; margin-bottom:12px; }
.gt .excollapsed.alldone{ background:#F2F8F3; border-color:#D7EADC; }
.gt .excollapsed .donedot{ width:24px; height:24px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:var(--surface2); color:var(--steel); flex:none; }
.gt .excollapsed .donedot.on{ background:var(--good); color:#fff; }
.gt .excollapsed .colmeta{ display:block; font-size:10.5px; color:var(--steel); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gt .progresshint{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--good); font-weight:700; margin-top:9px; padding:8px 10px; background:#EAF6EE; border-radius:9px; }
.gt .reorder{ margin-bottom:8px; }
.gt .reorder-row{ display:flex; align-items:center; gap:8px; padding:9px 10px; margin-bottom:6px; border:1px solid var(--line); border-radius:11px; background:var(--surface); }
.gt .reorder-row.dragging{ background:var(--ink); color:#fff; box-shadow:0 6px 18px -6px rgba(0,0,0,.35); }
.gt .reorder-row .draghandle{ display:flex; align-items:center; justify-content:center; width:30px; height:30px; color:var(--steel); cursor:grab; flex:none; background:none; }
.gt .reorder-row.dragging .draghandle{ color:#fff; cursor:grabbing; }
.gt .reorder-row .ord{ font-size:11px; color:var(--steel); width:16px; text-align:center; flex:none; }
.gt .reorder-row.dragging .ord{ color:#fff; }
.gt .inp{ width:100%; background:var(--surface2); border:1px solid var(--line); border-radius:9px; padding:11px 8px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; text-align:center; color:var(--ink); }
.gt .inp:focus{ outline:2px solid var(--accent); outline-offset:-1px; background:#fff; }
.gt .setrow.done .inp{ background:#EAF7F0; border-color:#BfE6D2; }
.gt .ck{ width:40px; height:40px; border-radius:10px; border:1px solid var(--line); background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--steel); }
.gt .ck.on{ background:var(--good); border-color:var(--good); color:#fff; }
.gt .addset{ display:flex; align-items:center; justify-content:center; gap:7px; width:100%; padding:11px; margin-top:4px; border:1px dashed var(--line); border-radius:10px; color:var(--ink2); font-weight:700; font-size:12px; letter-spacing:.5px; text-transform:uppercase; background:transparent; }

/* rest timer bar */
.gt .restbar{ position:fixed; bottom:78px; left:50%; transform:translateX(-50%); width:100%; max-width:440px; padding:0 14px; z-index:40; animation:restup .28s cubic-bezier(.2,.9,.3,1.2); }
@keyframes restup{ from{ transform:translate(-50%,16px); opacity:0; } to{ transform:translate(-50%,0); opacity:1; } }
.gt .restinner{ position:relative; overflow:hidden; background:rgba(18,18,21,.82); backdrop-filter:blur(18px) saturate(1.4); -webkit-backdrop-filter:blur(18px) saturate(1.4); color:#fff; border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:13px 14px 15px; display:flex; align-items:center; gap:13px; box-shadow:0 16px 40px -10px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06); }
.gt .ring{ position:relative; width:54px; height:54px; flex:none; }
.gt .ring .cd{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-weight:800; font-size:14.5px; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
.gt .restlabel{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.45); }
.gt .restchips{ display:flex; gap:6px; margin-top:7px; }
.gt .restchips button{ background:transparent; color:rgba(255,255,255,.75); border:1px solid rgba(255,255,255,.18); border-radius:999px; padding:4px 11px; font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; transition:all .15s; }
.gt .restchips button:active{ background:rgba(255,255,255,.16); color:#fff; }
.gt .restbtns{ display:flex; gap:6px; margin-left:auto; }
.gt .restbtns button{ width:38px; height:38px; border-radius:999px; background:rgba(255,255,255,.09); color:#fff; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,.07); transition:background .15s; }
.gt .restbtns button:active{ background:rgba(255,255,255,.2); }
.gt .restbtns button.wide{ width:auto; padding:0 13px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:11.5px; }
.gt .resttrack{ position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.08); }
.gt .resttrack .fillbar{ height:100%; border-radius:0 3px 3px 0; transition:width 1s linear, background .4s; }
.gt .restdone .restinner{ animation:restpulse .5s ease 2; }
@keyframes restpulse{ 50%{ box-shadow:0 0 0 3px rgba(222,52,23,.5), 0 16px 40px -10px rgba(0,0,0,.45); } }

/* bottom nav */
.gt .nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:rgba(255,255,255,.94); backdrop-filter:blur(10px); border-top:1px solid var(--line); display:flex; z-index:50; }
.gt .navbtn{ flex:1; padding:9px 0 12px; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--steel); position:relative; }
.gt .navbtn.on{ color:var(--ink); }
.gt .navbtn.on::before{ content:''; position:absolute; top:0; width:26px; height:3px; border-radius:0 0 3px 3px; background:var(--accent); }
.gt .navbtn span{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.5px; text-transform:uppercase; font-weight:700; }

/* modal */
.gt .scrim{ position:fixed; inset:0; background:rgba(20,20,22,.5); z-index:60; display:flex; align-items:flex-end; justify-content:center; }
.gt .sheet{ background:var(--concrete); width:100%; max-width:480px; border-radius:20px 20px 0 0; max-height:92vh; overflow:auto; padding:8px 16px 24px; }
.gt .sheeth{ position:sticky; top:0; background:var(--concrete); display:flex; align-items:center; justify-content:space-between; padding:12px 2px 12px; z-index:2; }
.gt .sheeth .tt{ font-family:'Archivo',sans-serif; font-weight:900; font-size:20px; text-transform:uppercase; letter-spacing:-.01em; }
.gt .sheetfoot{ position:sticky; bottom:0; background:var(--concrete); padding:12px 0 6px; margin-top:6px; box-shadow:0 -8px 16px -8px rgba(0,0,0,.12); }
.gt .pkghead{ display:flex; align-items:center; gap:10px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px; }
.gt{ --balance-over:#DE3417; --balance-balanced:#2FA25A; --balance-under:#2E6BE6; --balance-neutral:transparent; }
.gt .muscle-path{ transition:fill 220ms ease, fill-opacity 220ms ease, filter 220ms ease; cursor:pointer; pointer-events:auto; outline:none; }
.gt .muscle-path:hover{ filter:brightness(1.12) saturate(1.1); fill-opacity:0.8 !important; }
.gt .muscle-path:focus-visible{ stroke:#111; stroke-width:1.3; }
.gt .muscle-path.selected{ stroke:#111; stroke-width:1.4; fill-opacity:0.82 !important; }
.gt .muscle-path.debug{ stroke:#DE3417; stroke-width:0.8; fill:#DE3417 !important; fill-opacity:0.14 !important; }
.gt .tracer-readout{ position:absolute; left:6px; bottom:6px; background:rgba(20,20,22,.86); color:#fff; font-family:'JetBrains Mono',monospace; font-size:9.5px; padding:3px 6px; border-radius:6px; pointer-events:none; max-width:92%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gt .viewlabel{ font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--steel); margin-top:4px; }
.gt .pkghead:active{ background:var(--surface2); }
.gt .pkghead .pkgbar{ width:5px; align-self:stretch; border-radius:3px; flex:none; }
.gt .pkghead .pkgname{ display:block; font-family:'Archivo',sans-serif; font-weight:900; font-size:18px; text-transform:uppercase; letter-spacing:-.01em; }
.gt .pkghead .pkgmeta{ display:block; font-size:11px; color:var(--steel); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }
.gt .wrow{ display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--line2); }
.gt .wrow:first-child{ border-top:none; }
.gt .wrow .wtap{ min-width:0; flex:1; text-align:left; background:none; }
.gt .archbadge{ font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--steel); background:var(--surface2); border:1px solid var(--line); border-radius:999px; padding:2px 7px; margin-left:8px; vertical-align:middle; }
.gt .field{ margin-bottom:16px; }
.gt .field label{ display:block; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--steel); margin-bottom:8px; }
.gt .tin{ width:100%; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:13px 14px; font-size:15px; font-weight:600; color:var(--ink); }
.gt .tin:focus{ outline:2px solid var(--accent); outline-offset:-1px; }

/* misc */
.gt .empty{ text-align:center; padding:34px 16px; color:var(--steel); }
.gt .empty .big{ font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; color:var(--ink2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.gt .empty p{ font-size:13px; line-height:1.5; margin:0 auto 16px; max-width:260px; }
.gt .spark{ display:block; }
.gt .muted{ color:var(--steel); font-size:12px; }
.gt .divlabel{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--steel); margin:20px 2px 10px; }
.gt .flash{ animation:flash .5s ease; }
@keyframes flash{ 0%{background:#FFE3DC;} 100%{background:var(--surface);} }
@media (prefers-reduced-motion: reduce){ .gt *{ animation:none !important; } }
`;

/* ---------------- constants ---------------- */
const MUSCLES = [
  { id: "chest", name: "Chest", color: "#E5473B" },

// which library subcategory an exercise belongs to (by its first primary muscle)
function groupForExercise(e) {
  if (e.category === "cardio") return "cardio";
  const first = (e.primary || [])[0];
  return muscleToGroup[first] || "other";
}

// For a routine: how many exercises hit each muscle group as primary / secondary.
function routineCoverage(routine, exById) {
  const primary = {}, secondary = {};
  let cardio = 0, strength = 0;
  (routine.exerciseIds || []).forEach((id) => {
    const ex = exById[id]; if (!ex) return;
    if (ex.category === "cardio") { cardio++; return; }
    strength++;
    GROUPS.forEach((g) => {
      const hitP = (ex.primary || []).some((m) => g.muscles.includes(m));
      const hitS = (ex.secondary || []).some((m) => g.muscles.includes(m));
      if (hitP) primary[g.id] = (primary[g.id] || 0) + 1;
      else if (hitS) secondary[g.id] = (secondary[g.id] || 0) + 1;
    });
  });
  return { primary, secondary, cardio, strength };
}

// Best-guess sub-muscles from an exercise's name + muscles (used to pre-tag the library).
function inferSubMuscles(ex) {
  try {
    const n = (ex.name || "").toLowerCase();
    const P = ex.primary || [], S = ex.secondary || [];
    const involves = (m) => P.includes(m) || S.includes(m);
    const has = (...k) => k.some((x) => n.includes(x));
    const out = new Set();
    const block = (muscle, fn, dflt) => {
      if (!involves(muscle)) return;
      const before = out.size;
      fn();
      if (out.size === before && dflt) dflt.forEach((d) => out.add(d));
    };
    block("chest", () => {
      if (has("incline", "low to high", "upward")) out.add("chest_upper");
      else if (has("decline", "high to low", "dip")) out.add("chest_lower");
      else out.add("chest_mid");
    }, ["chest_mid"]);
    block("shoulders", () => {
      if (has("lateral raise") || (has("lateral") && !has("front"))) out.add("delt_side");
      if (has("front raise") || (has("front") && !has("lateral"))) out.add("delt_front");
      if (has("rear delt", "face pull", "reverse pec", "rear")) out.add("delt_rear");
      if (has("shrug", "upright")) out.add("traps");
      if (has("press", "arnold", "overhead")) { out.add("delt_front"); out.add("delt_side"); }
    }, ["delt_side"]);
    block("lats", () => {
      if (has("pulldown", "pull-up", "pull up", "pullup", "chin")) out.add("lats_upper");
      if (has("row", "pullover")) out.add("lats_lower");
      if (has("straight arm")) { out.add("lats_upper"); out.add("lats_lower"); }
    }, ["lats_upper", "lats_lower"]);
    block("upper_back", () => {
      if (has("shrug", "upright")) out.add("mid_traps");
      if (has("face pull", "rear", "reverse")) { out.add("rhomboids"); out.add("teres"); }
      if (has("row")) { out.add("rhomboids"); out.add("mid_traps"); }
    }, ["rhomboids"]);
    block("biceps", () => {
      if (has("hammer")) out.add("brachialis");
      if (has("preacher", "spider", "concentration")) out.add("bi_short");
      if (has("incline")) out.add("bi_long");
      if (has("reverse")) out.add("brachialis");
    }, ["bi_long", "bi_short"]);
    block("triceps", () => {
      if (has("overhead", "skull", "french")) out.add("tri_long");
      if (has("pushdown", "pressdown", "kickback")) { out.add("tri_lateral"); out.add("tri_medial"); }
      if (has("close grip", "dip", "diamond")) { out.add("tri_lateral"); out.add("tri_medial"); }
      if (has("extension") && !has("leg")) out.add("tri_long");
    }, ["tri_long", "tri_lateral"]);
    block("forearms", () => {
      if (has("wrist curl")) out.add("fa_flexors");
      if (has("reverse")) out.add("fa_extensors");
      if (has("hammer")) out.add("brachioradialis");
    }, ["fa_flexors"]);
    block("quads", () => {
      if (has("extension")) out.add("rectus_femoris");
      else { out.add("vastus_lateralis"); out.add("vastus_medialis"); out.add("rectus_femoris"); }
    }, ["vastus_lateralis", "vastus_medialis"]);
    block("hamstrings", () => { out.add("biceps_femoris"); out.add("semi_hams"); }, ["biceps_femoris", "semi_hams"]);
    block("glutes", () => {
      if (has("thrust", "bridge", "hip")) out.add("glute_max");
      if (has("abduction", "lunge", "split", "step")) { out.add("glute_max"); out.add("glute_med"); }
    }, ["glute_max"]);
    block("calves", () => {
      if (has("seated")) out.add("soleus");
      else out.add("gastrocnemius");
    }, ["gastrocnemius"]);
    block("core", () => {
      if (has("leg raise", "hanging", "reverse crunch", "hip raise")) out.add("abs_lower");
      if (has("crunch", "sit-up", "sit up", "situp")) out.add("abs_upper");
      if (has("twist", "oblique", "side")) out.add("obliques");
      if (has("plank")) out.add("transverse");
      if (has("rollout", "ab wheel")) { out.add("abs_upper"); out.add("abs_lower"); }
    }, ["abs_upper", "abs_lower"]);
    return [...out];
  } catch { return []; }
}

function sessionType(s) {
  if (s.type && workoutTypeById[s.type]) return s.type;
  const cats = (s.entries || []).map((e) => e.category);
  if (cats.length && cats.every((c) => c === "cardio")) return "cardio";
  return "weights";
}

// How much a logged exercise-entry contributes to a group in a metric.
// Primary hit = full weight, secondary hit = half. Cardio is excluded.
function groupContribution(entry, group, metric) {
  if (entry.category === "cardio") return 0;
  const hitsPrimary = (entry.primary || []).some((m) => group.muscles.includes(m));
  const hitsSecondary = (entry.secondary || []).some((m) => group.muscles.includes(m));
  const factor = hitsPrimary ? 1 : hitsSecondary ? 0.5 : 0;
  if (!factor) return 0;
  return entry.sets.reduce((a, s) => a + (metric === "volume" ? setVolume(s) * factor : factor), 0);
}

/* ---------------- storage ---------------- */
const store = {
  async get(key, fb) {
    try { const v = localStorage.getItem("gt:" + key); return v == null ? fb : JSON.parse(v); }
    catch (e) { return fb; }
  },
  async set(key, val) {
    try { localStorage.setItem("gt:" + key, JSON.stringify(val)); } catch (e) {}
  },
};

/* ---------------- helpers ---------------- */
const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
function parseTime(v) {
  if (v == null || v === "") return 0;
  const s = String(v).trim();
  if (s.includes(":")) { const [m, ss] = s.split(":"); return num(m) * 60 + num(ss); }
  return num(s);
}
function fmtTime(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}
function fmtDur(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return h ? `${h}h ${m}m` : `${m}m`;
}
const dayKey = (ts) => new Date(ts).toISOString().slice(0, 10);
const within = (ts, days) => ts >= Date.now() - days * 864e5;
function relDay(ts) {
  const d = Math.floor((Date.now() - ts) / 864e5);
  if (dayKey(ts) === dayKey(Date.now())) return "Today";
  if (d <= 1) return "Yesterday";
  if (d < 7) return `${d} days ago`;
  return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function setVolume(s) { return s.weight > 0 && s.reps > 0 ? s.weight * s.reps : 0; }

// start-of-week (Monday) timestamp
function weekStart(ts) {
  const d = new Date(ts); d.setHours(0, 0, 0, 0);
  const day = (d.getDay() + 6) % 7; // Mon = 0
  d.setDate(d.getDate() - day);
  return d.getTime();
}
// build the last n weekly buckets (oldest -> newest)
function weekBuckets(n) {
  const cur = weekStart(Date.now());
  return Array.from({ length: n }, (_, i) => {
    const start = cur - (n - 1 - i) * 7 * 864e5;
    return { start, end: start + 7 * 864e5, label: new Date(start).toLocaleDateString(undefined, { month: "numeric", day: "numeric" }) };
  });
}
// build the last n monthly buckets (oldest -> newest)
function monthBuckets(n) {
  const now = new Date(); const buckets = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const start = d.getTime();
    const end = new Date(d.getFullYear(), d.getMonth() + 1, 1).getTime();
    buckets.push({ start, end, label: d.toLocaleDateString(undefined, { month: "short" }) });
  }
  return buckets;
}

/* ============================================================
   APP
   ============================================================ */
export default function App() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("home");
  const [exercises, setEx] = useState([]);
  const [routines, setRt] = useState([]);
  const [programs, setPrograms] = useState([]);
  const [sessions, setSess] = useState([]);
  const [active, setActive] = useState(null);
  const [unit, setUnit] = useState("kg");
  const [dist, setDist] = useState("km");
  const [restDefault, setRestDefault] = useState(90);
  const [rest, setRest] = useState(null); // {total, left, running}

  const exById = useMemo(() => Object.fromEntries(exercises.map((e) => [e.id, e])), [exercises]);

  useEffect(() => {
    (async () => {
      let ex = await store.get("exercises", null);
      let rt = await store.get("routines", null);
      if (!ex) { ex = seedExercises(); store.set("exercises", ex); }
      if (!rt) { rt = seedRoutines(); store.set("routines", rt); }
      // one-time imports: the user's own library + common movements
      let packs = await store.get("packs", []);
      const applyPack = (id, list) => {
        if (packs.includes(id)) return;
        const have = new Set(ex.map((e) => e.name.trim().toLowerCase()));
        const add = list.filter((e) => !have.has(e.name.trim().toLowerCase()));
        if (add.length) ex = [...ex, ...add];
        packs = [...packs, id];
      };
      applyPack("andy-import-1", IMPORTED_EXERCISES);
      applyPack("common-2", COMMON_EXERCISES);
      applyPack("common-3", COMMON_EXERCISES_3);
      applyPack("andy-split-2", SPLIT2_EXERCISES);
      // ensure every exercise has sub-muscle tags (covers newly added packs too)
      ex = ex.map((e) => (e.subMuscles && e.subMuscles.length) ? e : { ...e, subMuscles: inferSubMuscles(e) });
      if (!packs.includes("submuscle-1")) packs = [...packs, "submuscle-1"];
      // one-time: replace routines with the shared 5-day split
      if (!packs.includes("routines-andy-2")) {
        const byName = {};
        ex.forEach((e) => { byName[e.name.trim().toLowerCase()] = e.id; });
        const progId = uid();
        rt = ROUTINE_SPECS.map((spec) => ({
          id: uid(), name: spec.name, color: spec.color, programId: progId,
          exerciseIds: spec.ex.map((n) => byName[n.trim().toLowerCase()]).filter(Boolean),
        }));
        store.set("routines", rt);
        store.set("programs", [{ id: progId, name: "Only Split You Need", color: "#DE3417", createdAt: Date.now() }]);
        packs = [...packs, "routines-andy-2"];
      }
      if (!packs.includes("routines-andy-3")) {
        const byName = {};
        ex.forEach((e) => { byName[e.name.trim().toLowerCase()] = e.id; });
        const twoSet = ["ez bar reverse curl", "dumbbell hammer curl", "high cable curl"];
        ex = ex.map((e) => twoSet.includes(e.name.trim().toLowerCase()) ? { ...e, scheme: { warmups: 1, work: 2, lo: 10, hi: 15 } } : e);
        const SPEC2 = [
          { name: "Push", ex: ["Seated Dumbbell Lateral Raise", "Incline Barbell Press", "Machine Shoulder Press", "Seated Chest Press Machine", "High to Low Cable Fly", "Cable Rope Tricep Pressdown", "Decline Chest Press Machine", "Standing Calf Raise"] },
          { name: "Pull", ex: ["Chest Supported Machine Row", "Straight Bar Lat Pulldown", "Wide Grip Cable Row", "Double Rear Delt Cable Fly", "EZ Bar Reverse Curl", "Dumbbell Hammer Curl", "High Cable Curl"] },
          { name: "Lower", ex: ["Hack Squat", "Machine Leg Extension", "Barbell Romanian Deadlift", "Machine Leg Press", "Machine Seated Leg Curl", "Machine Lying Leg Curl", "Walking Lunge", "Standing Calf Raise"] },
          { name: "Delts + Arms", ex: ["Seated Machine Lateral Raise", "Machine Shoulder Press", "Chest Supported Dumbbell Lateral Raise", "Face Pull", "Dumbbell Incline Curl", "Cable Rope Tricep Pressdown", "Single Arm Cross-Body Cable Tricep Extension"] },
          { name: "Chest + Back", ex: ["Cable Grip Lat Pulldown (Narrow Grip)", "Flat Smith Machine Chest Press", "Single Arm Dumbbell Row", "Incline Barbell Press", "Barbell Row (use straps)", "Pec Deck Fly", "Cable Crunch"] },
        ];
        const mapIds = (list) => list.map((n) => byName[n.trim().toLowerCase()]).filter(Boolean);
        const progId = (rt.find((r) => r.programId) || {}).programId || null;
        rt = rt.map((r) => {
          const spec = SPEC2.find((sp) => sp.name.toLowerCase() === r.name.trim().toLowerCase());
          return spec ? { ...r, exerciseIds: mapIds(spec.ex) } : r;
        });
        SPEC2.forEach((sp) => {
          if (!rt.some((r) => r.name.trim().toLowerCase() === sp.name.toLowerCase())) {
            rt = [...rt, { id: uid(), name: sp.name, color: "#DE3417", programId: progId, exerciseIds: mapIds(sp.ex) }];
          }
        });
        store.set("routines", rt);
        packs = [...packs, "routines-andy-3"];
      }
      store.set("exercises", ex);
      store.set("packs", packs);
      setEx(ex); setRt(rt);
      setPrograms(await store.get("programs", []));
      setSess(await store.get("sessions", []));
      setActive(await store.get("activeSession", null));
      const s = await store.get("settings", {});
      if (s.unit) setUnit(s.unit); if (s.dist) setDist(s.dist); if (s.restDefault) setRestDefault(s.restDefault);
      setLoading(false);
    })();
  }, []);

  // persistence wrappers
  const saveEx = (n) => { setEx(n); store.set("exercises", n); };
  const saveRt = (n) => { setRt(n); store.set("routines", n); };
  const saveProg = (n) => { setPrograms(n); store.set("programs", n); };
  const saveSess = (n) => { setSess(n); store.set("sessions", n); };
  const saveActive = (n) => { setActive(n); store.set("activeSession", n); };
  useEffect(() => { if (!loading) store.set("settings", { unit, dist, restDefault }); }, [unit, dist, restDefault, loading]);

  // rest timer engine
  useEffect(() => {
    if (!rest?.running) return;
    const t = setInterval(() => {
      setRest((r) => {
        if (!r || !r.running) return r;
        if (r.left <= 1) { beep(); return { ...r, left: 0, running: false }; }
        return { ...r, left: r.left - 1 };
      });
    }, 1000);
    return () => clearInterval(t);
  }, [rest?.running]);
  const startRest = (sec) => setRest({ total: sec, left: sec, running: true });

  /* ---- backup / restore ---- */
  const buildBackup = () => ({
    app: "iron-and-chalk", version: 2, exportedAt: Date.now(),
    exercises, routines, programs, sessions, activeSession: active, settings: { unit, dist },
  });
  const saveNow = () => {
    store.set("exercises", exercises); store.set("routines", routines); store.set("programs", programs);
    store.set("sessions", sessions); store.set("activeSession", active);
    store.set("settings", { unit, dist });
  };
  const restoreBackup = (obj) => {
    if (!obj || typeof obj !== "object" || (!obj.exercises && !obj.sessions && !obj.routines))
      throw new Error("This doesn't look like an Iron & Chalk backup.");
    if (Array.isArray(obj.exercises)) saveEx(obj.exercises);
    if (Array.isArray(obj.routines)) saveRt(obj.routines);
    if (Array.isArray(obj.programs)) saveProg(obj.programs);
    if (Array.isArray(obj.sessions)) saveSess(obj.sessions);
    if (obj.activeSession !== undefined) saveActive(obj.activeSession);
    if (obj.settings) { if (obj.settings.unit) setUnit(obj.settings.unit); if (obj.settings.dist) setDist(obj.settings.dist); }
  };
  const backup = {
    build: buildBackup, saveNow, restore: restoreBackup,
    counts: { exercises: exercises.length, routines: routines.length, sessions: sessions.length },
  };

  /* ---- workout actions ---- */
  const startWorkout = (routine) => {
    const entries = routine.exerciseIds
      .filter((id) => exById[id])
      .map((id) => {
        const ex = exById[id];
        const lastSess = sessions.find((s) => s.entries && s.entries.some((en) => en.exerciseId === id));
        const lastEntry = lastSess ? lastSess.entries.find((en) => en.exerciseId === id) : null;
        return { exerciseId: id, sets: makeSets(ex, lastEntry, unit) };
      });
    saveActive({ id: uid(), routineId: routine.id, routineName: routine.name, color: routine.color, plannedMin: routine.plannedMin, startedAt: Date.now(), entries });
    setTab("workout");
  };
  const addSession = (rec) => saveSess([rec, ...sessions].sort((a, b) => b.date - a.date));
  const deleteSession = (id) => saveSess(sessions.filter((s) => s.id !== id));
  const quickLog = ({ date, type, name, minutes }) => {
    const t = workoutTypeById[type] || WORKOUT_TYPES[0];
    addSession({
      id: uid(), date, type, routineName: (name || "").trim() || t.name,
      color: t.color, durationSec: Math.round((minutes || 0) * 60), entries: [], quick: true,
    });
  };
  const finishWorkout = (type, hrPhoto) => {
    if (!active) return;
    const entries = active.entries.map((en) => {
      const ex = exById[en.exerciseId];
      if (!ex) return null;
      const sets = en.sets.map((s) => ({
        weight: num(s.weight), reps: num(s.reps), warmup: !!s.warmup,
        timeSec: parseTime(s.time), distance: num(s.distance), done: !!s.done,
      })).filter((s) => s.reps > 0 || s.weight > 0 || s.timeSec > 0 || s.distance > 0);
      if (!sets.length) return null;
      return {
        exerciseId: ex.id, name: ex.name, category: ex.category,
        trackingType: ex.trackingType, primary: ex.primary, secondary: ex.secondary, sets,
      };
    }).filter(Boolean);
    if (entries.length) {
      if (hrPhoto) store.set(`hrphoto:${active.id}`, hrPhoto);
      addSession({
        id: active.id, date: Date.now(), routineName: active.routineName, routineId: active.routineId, type: type || "weights",
        color: active.color, startedAt: active.startedAt, endedAt: Date.now(),
        durationSec: Math.round((Date.now() - active.startedAt) / 1000), hrPhoto: !!hrPhoto, entries,
      });
    }
    saveActive(null);
    setRest(null);
    setTab("home");
  };

  if (loading) {
    return (
      <div className="gt"><style>{CSS}</style>
        <div className="wrap"><div className="top"><div><div className="eyebrow">Iron & Chalk</div><h1>Loading…</h1></div></div></div>
      </div>
    );
  }

  return (
    <div className="gt">
      <style>{CSS}</style>
      <div className="wrap">
        {tab === "home" && (
          <Dashboard {...{ sessions, exercises, routines, exById, active, unit, dist, setUnit, setDist, setTab, backup }} />
        )}
        {tab === "routines" && (
          <Routines {...{ routines, programs, exercises, exById, active, saveRt, saveProg, startWorkout, setTab, backup, sessions, dist, restDefault }} />
        )}
        {tab === "workout" && (
          <Workout {...{ active, saveActive, exById, exercises, sessions, unit, dist, startRest, restDefault, setRestDefault, finishWorkout, setTab }} />
        )}
        {tab === "library" && (
          <LibraryView {...{ exercises, saveEx, routines }} />
        )}
        {tab === "calendar" && (
          <CalendarView {...{ sessions, quickLog, deleteSession }} />
        )}
        {tab === "history" && (
          <HistoryView {...{ sessions, routines, programs, exById, dist }} />
        )}
      </div>

      {rest && (() => {
        const pct = rest.total ? rest.left / rest.total : 0;
        const col = rest.left <= 5 ? "#DE3417" : rest.left <= 15 ? "#F2A81E" : "#2FA25A";
        return (
          <div className={`restbar ${rest.left === 0 ? "restdone" : ""}`}>
            <div className="restinner">
              <div className="ring">
                <Ring pct={pct} color={col} />
                <div className="cd">{fmtTime(rest.left)}</div>
              </div>
              <div style={{ minWidth: 0 }}>
                <div className="restlabel">{rest.left === 0 ? "Go — next set" : rest.running ? "Resting" : "Paused"}</div>
                <div className="restchips">
                  {[60, 90, 120].map((s) => (
                    <button key={s} onClick={() => startRest(s)}>{s}</button>
                  ))}
                </div>
              </div>
              <div className="restbtns">
                <button className="wide" onClick={() => setRest((r) => ({ ...r, left: r.left + 15, running: true }))}>+15</button>
                <button onClick={() => setRest((r) => ({ ...r, running: !r.running }))}>
                  {rest.running ? <Pause size={16} /> : <Play size={16} />}
                </button>
                <button onClick={() => setRest(null)}><X size={16} /></button>
              </div>
              <div className="resttrack"><div className="fillbar" style={{ width: `${pct * 100}%`, background: col }} /></div>
            </div>
          </div>
        );
      })()}

      <nav className="nav">
        {[
          ["home", "Home", Home],
          ["calendar", "Calendar", CalendarDays],

          ["history", "History", HistoryIcon],
          ["library", "Library", LibraryIcon],
        ].map(([id, label, Icon]) => (
          <button key={id} className={`navbtn ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
            <Icon size={21} strokeWidth={2.2} />
            <span>{label}</span>
            {id === "workout" && active && (
              <span style={{ position: "absolute", top: 6, right: "50%", marginRight: -18, width: 7, height: 7, borderRadius: 9, background: "var(--accent)" }} />

}

/* ---------------- shared bits ---------------- */
function newSet(o = {}) { return { id: uid(), weight: "", reps: "", time: "", distance: "", done: false, warmup: !!o.warmup, target: o.target || "", phw: o.phw || "", phr: o.phr || "" }; }
function isCompound(ex) {
  if (ex && typeof ex.compound === "boolean") return ex.compound;
  return /(squat|deadlift|bench press|chest press|overhead press|shoulder press|military press|push press|barbell row|bent[- ]?over row|pendlay|t-bar row|seal row|romanian|rdl|hip thrust|glute bridge|pull[- ]?up|chin[- ]?up|weighted dip|^dip$|lunge|split squat|bulgarian|leg press|hack squat|power clean|clean|snatch|lat pulldown|pulldown|good morning|thruster|floor press|incline barbell press|incline dumbbell press|decline press|landmine press)/i.test((ex && ex.name) || "");
}
function liftDefaults(ex) {
  if (ex && ex.scheme) return ex.scheme;
  return isCompound(ex) ? { warmups: 2, work: 2, lo: 6, hi: 10 } : { warmups: 1, work: 3, lo: 10, hi: 15 };
}
function incFor(ex, unit) { const c = isCompound(ex); return unit === "lb" ? (c ? 5 : 2.5) : (c ? 2.5 : 1.25); }
function makeSets(ex, lastEntry, unit) {
  if (!ex || ex.category === "cardio") return [newSet()];
  const d = liftDefaults(ex); const out = [];
  const lastW = lastEntry ? lastEntry.sets.filter((s) => s.warmup) : [];
  const lastS = lastEntry ? lastEntry.sets.filter((s) => !s.warmup) : [];
  const sugg = suggestWeight(ex, lastEntry, unit);
  for (let i = 0; i < d.warmups; i++) {
    const p = lastW[i];
    out.push(newSet({ warmup: true, phw: p && p.weight ? String(p.weight) : "", phr: p && p.reps ? String(p.reps) : "" }));
  }
  for (let i = 0; i < d.work; i++) {
    const p = lastS[i];
    out.push(newSet({
      target: `${d.lo}-${d.hi}`,
      phw: sugg != null ? String(sugg) : (p && p.weight ? String(p.weight) : ""),
      phr: p && p.reps ? String(p.reps) : "",
    }));
  }
  return out;
}
function suggestWeight(ex, lastEntry, unit) {
  if (!lastEntry) return null;
  const work = lastEntry.sets.filter((s) => !s.warmup);
  const ws = work.length ? work : lastEntry.sets;
  const weights = ws.map((s) => s.weight || 0).filter((w) => w > 0);
  if (!weights.length) return null;
  const lastW = Math.max(...weights);
  const d = liftDefaults(ex);
  const allHit = ws.every((s) => (s.reps || 0) >= d.hi);
  return allHit ? +(lastW + incFor(ex, unit)).toFixed(2) : lastW;
}
function compressImage(file, maxDim = 1000, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width >= height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        try {
          const c = document.createElement("canvas");
          c.width = width; c.height = height;
          c.getContext("2d").drawImage(img, 0, 0, width, height);
          resolve(c.toDataURL("image/jpeg", quality));
        } catch (e) { reject(e); }
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function beep() {  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = "sine"; o.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.32, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.45);
    o.start(); o.stop(ctx.currentTime + 0.47);
  } catch {}
  if (navigator.vibrate) navigator.vibrate([160, 60, 160]);
}
function Ring({ pct, color = "#DE3417" }) {
  const r = 24, c = 2 * Math.PI * r;
  return (
    <svg width="54" height="54" viewBox="0 0 54 54">
      <circle cx="27" cy="27" r={r} fill="none" stroke="rgba(255,255,255,.1)" strokeWidth="3" />
      <circle cx="27" cy="27" r={r} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - pct)} transform="rotate(-90 27 27)"
        style={{ transition: "stroke-dashoffset 1s linear, stroke .4s" }} />
    </svg>
  );
}

}

          </button>

        <p className="muted" style={{ marginTop: 4, fontSize: 11 }}>Tap a muscle for weekly / monthly trends.</p>
      </div>

            <button className={bmSource === "actual" ? "on" : ""} onClick={() => setBmSource("actual")}>Actual</button>
          </div>
        </div>
        {bmSource === "actual" && (
          <div style={{ display: "flex", gap: 6, justifyContent: "flex-end", marginBottom: 10 }}>
            <div className="seg">
              <button className={bmDays === 7 ? "on" : ""} onClick={() => setBmDays(7)}>7d</button>

            <div className="seg">

              <button className={bmMetric === "volume" ? "on" : ""} onClick={() => setBmMetric("volume")}>Vol</button>
            </div>
          </div>

        <BodyMap items={(() => {
          if (bmSource === "planned") {
            const seen = new Set(); const out = [];
            routines.forEach((r) => (r.exerciseIds || []).forEach((id) => {
              const ex = exById[id]; if (!ex || ex.category === "cardio") return;
              out.push({ name: ex.name, primary: ex.primary, secondary: ex.secondary, subMuscles: ex.subMuscles || [], weight: 1 });
            }));
            return out;
          }
          const map = {};
          sessions.filter((s) => within(s.date, bmDays)).forEach((s) => s.entries.forEach((en) => {
            if (en.category === "cardio") return;
            const amt = bmMetric === "volume" ? en.sets.reduce((a, st) => a + setVolume(st), 0) : en.sets.length;
            if (!amt) return;

function BackupSheet({ backup, flash, onClose }) {
  const fileRef = useRef(null);
  const [pasted, setPasted] = useState("");
  const json = useMemo(() => JSON.stringify(backup.build(), null, 2), []);

  const download = () => {
    try {
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `iron-chalk-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      flash("Backup downloaded");
    } catch { flash("Download blocked — copy the text instead"); }
  };

  const restore = (text) => {
    let obj;
    try { obj = JSON.parse(text); } catch { flash("That's not valid backup text"); return; }
    if (!window.confirm("Restore this backup? It replaces your current exercises, routines and history.")) return;
    try { backup.restore(obj); flash("Backup restored"); onClose(); }
    catch (e) { flash(e.message || "Couldn't restore backup"); }
  };

  const onFile = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => restore(String(r.result));
    r.onerror = () => flash("Couldn't read that file");
    r.readAsText(f);
    e.target.value = "";
  };

  const copy = async () => {
    try { await navigator.clipboard.writeText(json); flash("Copied — paste into Notes to save it"); }
    catch { flash("Select the text below and copy it"); }
  };

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth"><div className="tt">Save / load backup</div>
          <button className="iconbtn" onClick={onClose}><X size={18} /></button>
        </div>

        <div className="divlabel" style={{ marginTop: 4 }}>Save a backup</div>
        <div className="card">
          <p className="muted" style={{ marginBottom: 12 }}>Contains {backup.counts.exercises} exercises · {backup.counts.routines} routines · {backup.counts.sessions} workouts. Copying is the most reliable — paste it into Notes or any text app to keep it.</p>
          <button className="btn acc" onClick={copy}><Copy size={16} /> Copy backup</button>
          <button className="btn ghost" style={{ marginTop: 10 }} onClick={download}><Download size={15} /> Download as file</button>
          <textarea className="tin mono" readOnly value={json} onClick={(e) => e.target.select()}
            style={{ marginTop: 10, height: 96, fontSize: 11, lineHeight: 1.4, resize: "vertical" }} />
        </div>

        <div className="divlabel">Load a backup</div>
        <div className="card">
          <p className="muted" style={{ marginBottom: 12 }}>Restoring replaces everything currently in the app.</p>
          <button className="btn dark" onClick={() => fileRef.current?.click()}><Upload size={16} /> Choose backup file</button>
          <input ref={fileRef} type="file" accept="application/json,.json" onChange={onFile} style={{ display: "none" }} />
          <textarea className="tin mono" value={pasted} onChange={(e) => setPasted(e.target.value)} placeholder="…or paste backup text here"
            style={{ marginTop: 10, height: 80, fontSize: 11, resize: "vertical" }} />
          <button className="btn ghost" style={{ marginTop: 10 }} disabled={!pasted.trim()} onClick={() => restore(pasted)}>
            <RotateCcw size={15} /> Restore from text
          </button>
        </div>
      </div>
    </div>
  );
}

function MuscleDetail({ group, sessions, exById, unit, onClose }) {
  const [period, setPeriod] = useState("week"); // week | month
  const [metric, setMetric] = useState("sets"); // sets | volume

  const data = useMemo(() => {
    const buckets = (period === "week" ? weekBuckets(12) : monthBuckets(6))
      .map((b) => ({ ...b, value: 0 }));
    sessions.forEach((s) => {
      const b = buckets.find((x) => s.date >= x.start && s.date < x.end);
      if (!b) return;
      s.entries.forEach((en) => { b.value += groupContribution(en, group, metric); });
    });
    return buckets;
  }, [sessions, group, period, metric]);

  const current = data[data.length - 1]?.value || 0;
  const prev = data[data.length - 2]?.value || 0;
  const delta = prev > 0 ? Math.round(((current - prev) / prev) * 100) : null;
  const maxV = Math.max(1, ...data.map((b) => b.value));

  const cur = data[data.length - 1];
  const contributors = useMemo(() => {
    const acc = {};
    sessions.filter((s) => cur && s.date >= cur.start && s.date < cur.end).forEach((s) =>
      s.entries.forEach((en) => {
        const v = groupContribution(en, group, metric);
        if (v > 0) acc[en.exerciseId] = (acc[en.exerciseId] || 0) + v;
      }));
    return Object.entries(acc).map(([id, v]) => ({ id, v, name: exById[id]?.name || id }))
      .sort((a, b) => b.v - a.v);
  }, [sessions, group, period, metric]);

  const fmtV = (v) => metric === "volume" ? `${Math.round(v).toLocaleString()} ${unit}` : `${Math.round(v * 10) / 10}`;
  const unitWord = metric === "volume" ? unit : "sets";

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth">
          <div className="tt" style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ width: 12, height: 12, borderRadius: 3, background: group.color }} />{group.name}
          </div>
          <button className="iconbtn" onClick={onClose}><X size={18} /></button>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <div className="seg" style={{ flex: 1 }}>
            <button style={{ flex: 1 }} className={period === "week" ? "on" : ""} onClick={() => setPeriod("week")}>Weekly</button>
            <button style={{ flex: 1 }} className={period === "month" ? "on" : ""} onClick={() => setPeriod("month")}>Monthly</button>
          </div>
          <div className="seg">
            <button className={metric === "sets" ? "on" : ""} onClick={() => setMetric("sets")}>Sets</button>
            <button className={metric === "volume" ? "on" : ""} onClick={() => setMetric("volume")}>Vol</button>
          </div>
        </div>

        <div className="card" style={{ marginBottom: 14 }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: "var(--steel)" }}>
            This {period}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginTop: 4 }}>
            <div className="mono" style={{ fontWeight: 800, fontSize: 34, lineHeight: 1 }}>{fmtV(current)}</div>
            <div className="mono muted" style={{ fontSize: 13 }}>{unitWord}</div>
            {delta !== null && (
              <span className="deltachip" style={{ background: delta >= 0 ? "#E7F6EE" : "#FDE9E4", color: delta >= 0 ? "var(--good)" : "var(--accent)" }}>
                {delta >= 0 ? "▲" : "▼"} {Math.abs(delta)}%
              </span>
            )}
          </div>
          <div className="muted" style={{ fontSize: 11, marginTop: 6 }}>vs {fmtV(prev)} {unitWord} last {period}</div>
        </div>

        <div className="divlabel">Progress over time · {period === "week" ? "last 12 weeks" : "last 6 months"}</div>
        <div className="card">
          <BarChart data={data} color={group.color} maxV={maxV} fmt={fmtV} />
        </div>

        <div className="divlabel">Driving this {period}</div>
        <div className="card" style={{ padding: "4px 16px" }}>
          {contributors.length ? contributors.map((c) => (
            <div className="lrow" key={c.id}>
              <div className="grow"><div className="name" style={{ fontSize: 14 }}>{c.name}</div></div>
              <div className="mono" style={{ fontWeight: 700, fontSize: 13, color: "var(--ink2)" }}>{fmtV(c.v)} {unitWord}</div>
            </div>
          )) : <div className="empty" style={{ padding: "18px 0" }}><p>No {group.name.toLowerCase()} work logged this {period} yet.</p></div>}
        </div>
      </div>
    </div>
  );
}

function BarChart({ data, color, maxV, fmt }) {
  const H = 150;
  const showEvery = data.length > 8 ? 2 : 1;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 5, height: H }}>
        {data.map((b, i) => {
          const h = maxV > 0 ? (b.value / maxV) * (H - 22) : 0;
          const isLast = i === data.length - 1;
          return (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
              {b.value > 0 && (
                <div className="mono" style={{ fontSize: 9, fontWeight: 700, color: "var(--ink2)", marginBottom: 3 }}>
                  {fmt(b.value).replace(/,/g, "").replace(/ .*/, "")}
                </div>
              )}
              <div title={`${b.label}: ${fmt(b.value)}`} style={{
                width: "100%", maxWidth: 26, height: Math.max(b.value > 0 ? 4 : 2, h), borderRadius: "5px 5px 0 0",
                background: isLast ? color : (b.value > 0 ? `${color}66` : "var(--line2)"),
              }} />
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 5, marginTop: 6 }}>
        {data.map((b, i) => (
          <div key={i} className="mono" style={{ flex: 1, textAlign: "center", fontSize: 8.5, color: "var(--steel)", whiteSpace: "nowrap" }}>
            {i % showEvery === 0 ? b.label : ""}
          </div>
        ))}
      </div>
    </div>
  );
}

function Sparkline({ pts }) {
  const w = 92, h = 34, pad = 3;
  const min = Math.min(...pts), max = Math.max(...pts), rng = max - min || 1;
  const step = pts.length > 1 ? (w - pad * 2) / (pts.length - 1) : 0;
  const d = pts.map((v, i) => `${pad + i * step},${h - pad - ((v - min) / rng) * (h - pad * 2)}`).join(" ");
  const lastX = pad + (pts.length - 1) * step;
  const lastY = h - pad - ((pts[pts.length - 1] - min) / rng) * (h - pad * 2);
  return (
    <svg className="spark" width={w} height={h}>
      <polyline points={d} fill="none" stroke="#DE3417" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={lastX} cy={lastY} r="3" fill="#DE3417" />
    </svg>
  );
}

/* ============================================================
   ROUTINES
   ============================================================ */
function mName(id) { return (muscleById[id] && muscleById[id].name) || (id ? id[0].toUpperCase() + id.slice(1).replace(/_/g, " ") : ""); }
// Estimated workout time: per-set execution + rest, plus setup per exercise.
function estimateMin(routine, exById, restSec = 90) {
  let sec = 0;
  (routine.exerciseIds || []).forEach((id) => {
    const ex = exById[id]; if (!ex) return;
    if (ex.category === "cardio") { sec += 10 * 60; return; }
    const d = liftDefaults(ex);
    sec += d.warmups * (30 + Math.min(60, restSec * 0.6));
    sec += d.work * (40 + restSec);
    sec += 75; // setup / transition
  });
  return Math.max(5, Math.round(sec / 60 / 5) * 5);
}
function schemeText(ex) {
  if (ex.category === "cardio") return "cardio";
  const d = liftDefaults(ex);
  return `${d.warmups} warm-up + ${d.work} working sets × ${d.lo}-${d.hi} reps [${isCompound(ex) ? "compound" : "isolation"}]`;
}
function exportExLine(ex) {
  const prim = (ex.primary || []).map(mName).join(", ");
  const sec = (ex.secondary || []).length ? ` (+${(ex.secondary || []).map(mName).join(", ")})` : "";
  return `- ${ex.name} — ${prim}${sec} — ${schemeText(ex)}`;
}
function fmtSetLog(s, dist) {
  if (s.weight > 0 && s.reps > 0) return `${s.weight}×${s.reps}${s.warmup ? "(W)" : ""}`;
  if (s.timeSec > 0) return fmtTime(s.timeSec);
  if (s.distance > 0) return `${s.distance}${dist}`;
  if (s.reps > 0) return `${s.reps}`;
  return "–";
}
function buildWorkoutExport(routine, exById, sessions, dist, restSec) {
  const lines = [`WORKOUT: ${routine.name}`];
  lines.push(`Estimated duration: ~${routine.plannedMin || estimateMin(routine, exById, restSec || 90)} min${routine.plannedMin ? " (planned)" : ""}`);
  if (restSec) lines.push(`Rest between sets: ${restSec}s (warm-ups ~${Math.round(Math.min(60, restSec * 0.6))}s)`);
  lines.push("Exercises (planned sets/reps):");
  routine.exerciseIds.map((id) => exById[id]).filter(Boolean).forEach((ex) => lines.push(exportExLine(ex)));
  const last = (sessions || []).find((s) => s.routineId === routine.id && s.entries && s.entries.length);
  if (last) {
    lines.push(`\nMost recent performance (${new Date(last.date).toLocaleDateString()}):`);
    last.entries.forEach((en) => lines.push(`- ${en.name}: ${en.sets.map((s) => fmtSetLog(s, dist)).join(", ")}`));
  }
  return lines.join("\n");
}
function buildRoutineExport(program, routines, exById, sessions, dist, restSec) {
  const ws = routines.filter((r) => r.programId === program.id);
  const out = [
    `ROUTINE: ${program.name}`, `${ws.length} workouts · rest between sets ${restSec || 90}s`, "",
    "Please analyse this training routine for muscle balance, weekly volume, progression, and any gaps or redundancy. Sets/reps below are the app defaults (compounds: 2 warm-up + 2 working @ 6-10; isolations: 1 warm-up + 3 working @ 10-15; weight increases when all working sets reach the top of the range).", "",
  ];
  ws.forEach((r) => { out.push(buildWorkoutExport(r, exById, sessions, dist, restSec)); out.push(""); });
  return out.join("\n");
}
function copyToClipboard(text) {
  try { if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text); return; } } catch (e) {}
  try { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); } catch (e) {}
}

function Routines({ routines, programs, exercises, exById, active, saveRt, saveProg, startWorkout, setTab, backup, sessions, dist, restDefault }) {
  const [editing, setEditing] = useState(null);
  const [editingProg, setEditingProg] = useState(null);
  const [openProg, setOpenProg] = useState(null);
  const [openWorkout, setOpenWorkout] = useState(null);
  const [expanded, setExpanded] = useState(new Set());
  const [showArchived, setShowArchived] = useState(false);
  const [toast, setToast] = useState("");
  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };
  const toggle = (id) => setExpanded((p) => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const copyExport = (text) => { copyToClipboard(text); flash("Copied for AI analysis"); };

  const del = (id) => { saveRt(routines.filter((r) => r.id !== id)); setOpenWorkout(null); };
  const save = (r) => {
    if (r.id && routines.some((x) => x.id === r.id)) saveRt(routines.map((x) => x.id === r.id ? r : x));
    else saveRt([...routines, { ...r, id: uid() }]);
    setEditing(null); flash("Workout saved");
  };
  const saveProgram = ({ program, routineIds }) => {
    let prog = program;
    if (prog.id && programs.some((x) => x.id === prog.id)) saveProg(programs.map((x) => x.id === prog.id ? prog : x));
    else { prog = { ...prog, id: uid(), createdAt: Date.now() }; saveProg([...programs, prog]); }
    const set = new Set(routineIds);
    saveRt(routines.map((r) => {
      if (set.has(r.id)) return { ...r, programId: prog.id };
      if (r.programId === prog.id) return { ...r, programId: undefined };
      return r;
    }));
    setEditingProg(null); flash("Routine saved");
  };
  const delProgram = (id) => {
    saveRt(routines.map((r) => r.programId === id ? { ...r, programId: undefined } : r));
    saveProg(programs.filter((p) => p.id !== id));
    setOpenProg(null); flash("Routine removed");
  };
  const archiveProgram = (id, val) => { saveProg(programs.map((p) => p.id === id ? { ...p, archived: val } : p)); setOpenProg(null); flash(val ? "Routine archived" : "Routine restored"); };

  const progStats = (p) => {
    const rids = new Set(routines.filter((r) => r.programId === p.id).map((r) => r.id));
    const ss = sessions.filter((s) => rids.has(s.routineId));
    return { workouts: ss.length, last: ss.length ? Math.max(...ss.map((s) => s.date)) : null, count: rids.size };
  };
  const ungrouped = routines.filter((r) => !r.programId || !programs.some((p) => p.id === r.programId));
  const archivedCount = programs.filter((p) => p.archived).length;
  const visible = programs.filter((p) => showArchived || !p.archived);

  const lastFor = (rid) => sessions.filter((s) => s.routineId === rid).sort((a, b) => b.date - a.date)[0];

  const WCard = (r) => {
    const cnt = r.exerciseIds.filter((id) => exById[id]).length;
    const last = lastFor(r.id);
    return (
      <div className="wrow" key={r.id}>
        <span className="dot" style={{ background: r.color, width: 9, height: 9, borderRadius: 3, flex: "none" }} />
        <button className="grow wtap" onClick={() => setOpenWorkout(r)}>
          <div className="name" style={{ fontSize: 14.5 }}>{r.name}</div>
          <div className="sub">{cnt} exercises · ~{r.plannedMin || estimateMin(r, exById, restDefault)} min{last?.durationSec ? ` · last took ${fmtDur(last.durationSec)}` : ""}</div>
        </button>
        <button className="btn dark sm" disabled={!cnt} onClick={() => startWorkout(r)}><Play size={14} /> Start</button>
      </div>
    );
  };

  const Accordion = ({ id, color, name, meta, items, badge, onAddProgramId, actions, onCopyAll }) => {
    const open = expanded.has(id);
    return (
      <div className="card" style={{ padding: 0, overflow: "hidden", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "stretch" }}>
          <span style={{ width: 5, background: color, flex: "none" }} />
          <button style={{ flex: 1, textAlign: "left", background: "none", padding: "14px 4px 14px 12px", display: "flex", alignItems: "center", gap: 10, minWidth: 0 }} onClick={() => toggle(id)}>
            <span style={{ flex: 1, minWidth: 0 }}>
              <span className="pkgname" style={{ display: "block" }}>{name}{badge && <span className="archbadge">{badge}</span>}</span>
              <span className="pkgmeta mono" style={{ display: "block" }}>{meta}</span>
            </span>
            <ChevronRight size={18} style={{ color: "var(--steel)", transform: open ? "rotate(90deg)" : "none", transition: "transform .15s", flex: "none" }} />
          </button>
          {actions}
        </div>
        {open && (
          <div style={{ padding: "0 12px 12px" }}>
            {items.length ? items.map(WCard) : <p className="muted" style={{ padding: "8px 2px" }}>No workouts yet.</p>}
            <button className="addset" onClick={() => setEditing({ name: "", color, exerciseIds: [], programId: onAddProgramId })}><Plus size={15} /> Add workout</button>
            {onCopyAll && <button className="btn dark sm" style={{ width: "100%", marginTop: 8 }} onClick={onCopyAll}><Copy size={14} /> Copy for AI analysis</button>}
          </div>
        )}
      </div>
    );
  };

  return (
    <>
      <div className="top">
        <div><div className="eyebrow">Your training</div><h1>Routines</h1></div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="iconbtn" onClick={() => setEditingProg({ name: "", color: "#2E6BE6" })} title="New routine"><Layers size={19} /></button>
          <button className="iconbtn" onClick={() => { backup?.saveNow?.(); flash("Saved"); }} title="Save"><Save size={19} /></button>
          <button className="iconbtn acc" onClick={() => setEditing({ name: "", color: "#DE3417", exerciseIds: [] })} title="New workout"><Plus size={20} /></button>
        </div>
      </div>

      {active && (
        <div className="card tight" style={{ borderColor: "var(--accent)", display: "flex", alignItems: "center", gap: 12 }}>
          <div className="grow" style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 14 }}>{active.routineName} in progress</div>
            <div className="muted">You have an unfinished workout.</div>
          </div>
          <button className="btn acc sm" onClick={() => setTab("workout")}>Resume</button>
        </div>
      )}

      {visible.map((p) => {
        const st = progStats(p);
        const items = routines.filter((r) => r.programId === p.id);
        const planned = items.reduce((a, r) => a + (r.plannedMin || estimateMin(r, exById, restDefault)), 0);
        const meta = `${st.count} workouts · ${st.workouts} sessions${planned ? ` · ~${planned}m` : ""}${st.last ? ` · last ${relDay(st.last)}` : ""}`;
        return (
          <Accordion key={p.id} id={p.id} color={p.color} name={p.name} meta={meta} items={items} onAddProgramId={p.id}
            onCopyAll={() => copyExport(buildRoutineExport(p, routines, exById, sessions, dist, restDefault))}
            badge={p.archived ? "Archived" : null}
            actions={<button className="iconbtn" style={{ border: "none", background: "none", alignSelf: "center", marginRight: 4 }} onClick={() => setOpenProg(p)} title="Details & history"><Activity size={16} /></button>} />
        );
      })}

      {ungrouped.length > 0 && (
        <Accordion id="__ungrouped" color="#8B8E95" name="Unsorted workouts" meta={`${ungrouped.length} workouts · not in a routine`} items={ungrouped} onAddProgramId={undefined} actions={null} />
      )}

      {archivedCount > 0 && (
        <button className="btn ghost" onClick={() => setShowArchived((v) => !v)}>{showArchived ? "Hide" : "Show"} archived routines ({archivedCount})</button>
      )}

      {editing && <RoutineEditor routine={editing} exercises={exercises} onSave={save} onClose={() => setEditing(null)} />}
      {editingProg && <ProgramEditor program={editingProg} routines={routines} onSave={saveProgram} onClose={() => setEditingProg(null)} />}
      {openWorkout && (
        <WorkoutDetail routine={openWorkout} exById={exById} sessions={sessions} restDefault={restDefault}
          onCopy={() => copyExport(buildWorkoutExport(openWorkout, exById, sessions, dist, restDefault))}
          onReorder={(rid, order) => saveRt(routines.map((r) => r.id === rid ? { ...r, exerciseIds: order } : r))}
          onStart={(r) => { setOpenWorkout(null); startWorkout(r); }}
          onEdit={(r) => { setOpenWorkout(null); setEditing(r); }}
          onDelete={(id) => { if (window.confirm("Delete this workout?")) del(id); }}
          onClose={() => setOpenWorkout(null)} />
      )}
      {openProg && (
        <ProgramSheet program={openProg} routines={routines} sessions={sessions} exById={exById}
          onCopy={() => copyExport(buildRoutineExport(openProg, routines, exById, sessions, dist, restDefault))}
          onEdit={() => { setEditingProg(openProg); setOpenProg(null); }}
          onArchive={() => archiveProgram(openProg.id, !openProg.archived)}
          onDelete={() => { if (window.confirm("Remove this routine? Its workouts stay, just ungrouped.")) delProgram(openProg.id); }}
          onStart={(r) => { setOpenProg(null); startWorkout(r); }} onClose={() => setOpenProg(null)} />
      )}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function WorkoutDetail({ routine, exById, sessions, restDefault, onStart, onEdit, onDelete, onCopy, onReorder, onClose }) {
  const [order, setOrder] = useState(routine.exerciseIds);
  useEffect(() => { setOrder(routine.exerciseIds); }, [routine.id]);
  const live = { ...routine, exerciseIds: order };
  const names = order.map((id) => exById[id]?.name).filter(Boolean);
  const done = (sessions || []).filter((s) => s.routineId === routine.id).sort((a, b) => b.date - a.date);
  const last = done[0];
  const avgMin = done.length ? Math.round(done.reduce((a, s) => a + (s.durationSec || 0), 0) / done.length / 60) : 0;
  const bmItems = order.map((id) => exById[id]).filter((ex) => ex && ex.category !== "cardio").map((ex) => ({ name: ex.name, primary: ex.primary, secondary: ex.secondary, subMuscles: ex.subMuscles || [], weight: 1 }));
  const reorder = (next) => { setOrder(next); onReorder && onReorder(routine.id, next); };
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth">
          <div className="tt" style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: routine.color }} />{routine.name}</div>
          <button className="iconbtn" onClick={onClose}><X size={18} /></button>
        </div>
        <p className="muted" style={{ marginTop: 2, marginBottom: 12 }}>{names.length} exercises · ~{routine.plannedMin || estimateMin(live, exById, restDefault)} min {routine.plannedMin ? "planned" : "est."}</p>
        {last?.durationSec ? (
          <div className="stats" style={{ marginBottom: 12 }}>
            <div className="stat"><div className="k">Last took</div><div className="v mono">{fmtDur(last.durationSec)}</div></div>
            <div className="stat"><div className="k">Last done</div><div className="v mono" style={{ fontSize: 15 }}>{relDay(last.date)}</div></div>
            {done.length > 1 ? <div className="stat"><div className="k">Avg time</div><div className="v mono">{avgMin}<span className="u">min</span></div></div> : null}
            {done.length > 1 ? <div className="stat"><div className="k">Sessions</div><div className="v mono">{done.length}</div></div> : null}
          </div>
        ) : null}
        <button className="btn acc" disabled={!names.length} onClick={() => onStart(live)}><Play size={16} /> Start workout</button>
        <div className="card" style={{ marginTop: 12 }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)", marginBottom: 8 }}>Exercises · drag to reorder</div>
          {order.length ? (
            <ReorderList
              items={order.map((id) => { const e = exById[id]; return { id, name: e ? e.name : id, sub: e ? (e.primary || []).map((m) => muscleById[m]?.name).filter(Boolean).join(", ") : "" }; })}
              onReorder={reorder} />
          ) : <p className="muted">No exercises yet.</p>}
          <CoverageStrip routine={live} exById={exById} />
          {bmItems.length > 0 && (
            <div style={{ marginTop: 14 }}>
              <div className="mono" style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--steel)", marginBottom: 4 }}>Body map</div>
              <BodyMap items={bmItems} />
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
          <button className="btn ghost" onClick={() => onEdit(routine)}><Pencil size={15} /> Edit workout</button>
          <button className="btn ghost" onClick={() => onDelete(routine.id)}><Trash2 size={15} /> Delete</button>
        </div>
        <button className="btn dark" style={{ marginTop: 8 }} onClick={onCopy}><Copy size={15} /> Copy for AI analysis</button>
      </div>
    </div>
  );
}

function ProgramEditor({ program, routines, onSave, onClose }) {
  const [name, setName] = useState(program.name || "");
  const [color, setColor] = useState(program.color || "#2E6BE6");
  const [ids, setIds] = useState(routines.filter((r) => r.programId === program.id).map((r) => r.id));

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheeth"><div className="tt">{program.id ? "Edit routine" : "New routine"}</div><button className="iconbtn" onClick={onClose}><X size={18} /></button></div>
        <div className="field"><label>Routine name</label>
          <input className="tin" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Only Split You Need" />
        </div>
        <div className="field"><label>Colour</label>
          <div style={{ display: "flex", gap: 8 }}>
            {colors.map((c) => <button key={c} onClick={() => setColor(c)} style={{ width: 34, height: 34, borderRadius: 9, background: c, border: color === c ? "3px solid var(--ink)" : "1px solid var(--line)" }} />)}
          </div>
        </div>
        <div className="field"><label>Workouts in this routine · {ids.length}</label>
          {routines.length ? routines.map((r) => {
            const on = ids.includes(r.id);
            return (
              <button key={r.id} onClick={() => toggle(r.id)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", textAlign: "left", padding: 12, marginBottom: 6, borderRadius: 11, background: on ? "var(--ink)" : "var(--surface)", color: on ? "#fff" : "var(--ink)", border: "1px solid var(--line)" }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: r.color, flex: "none" }} />
                <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{r.name}</div></div>
                {on ? <CheckCircle2 size={20} /> : <div style={{ width: 20, height: 20, borderRadius: 6, border: "1.5px solid var(--line)", flex: "none" }} />}

          }) : <p className="muted">Create some workouts first, then group them here.</p>}

        <div className="sheetfoot">
          <button className="btn acc" disabled={!name.trim()} onClick={() => onSave({ program: { ...program, name: name.trim(), color }, routineIds: ids })}>
            <Check size={17} /> Save routine
          </button>
        </div>
      </div>
    </div>
  );
}

function ProgramSheet({ program, routines, sessions, exById, onEdit, onArchive, onDelete, onStart, onCopy, onClose }) {
  const rs = routines.filter((r) => r.programId === program.id);
  const rids = new Set(rs.map((r) => r.id));
  const hist = sessions.filter((s) => rids.has(s.routineId)).sort((a, b) => b.date - a.date);
  const totalVol = Math.round(hist.reduce((v, s) => v + s.entries.reduce((a, en) => a + en.sets.reduce((x, st) => x + setVolume(st), 0), 0), 0));
  const totalSets = hist.reduce((n, s) => n + s.entries.reduce((a, en) => a + en.sets.length, 0), 0);
  const range = hist.length ? `${new Date(Math.min(...hist.map((s) => s.date))).toLocaleDateString(undefined, { month: "short", day: "numeric" })} – ${relDay(Math.max(...hist.map((s) => s.date)))}` : "Not started";
  return (
    <div className="scrim" onClick={onClose}>
